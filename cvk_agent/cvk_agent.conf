# ============================================================
# CVK Agent Configuration — mirrors Java cvk_agent.conf
# ============================================================
# Read by CvkConfig.from_file() and by FeignConfiguration.d()
# via FileUtil.readFile in the Java agent.
#
# Format: key=value (comments start with #)
# ============================================================

# Host identity
host_id=test-host-001
host_name=cvk-test-node-1
host_ip=192.168.1.10
cluster_id=cluster-001
host_pool_id=pool-001

# CVM connection
cvm_protocol=http
cvm_host=192.168.1.100
cvm_port=8080
cvm_username=admin
cvm_password=Cloud@123
cvm_uri_prefix=/cas/casrs

# Feign HTTP client timeouts (seconds)
FEIGN_CONNECT_TIMEOUT=10
FEIGN_READ_TIMEOUT=600
FEIGN_SLOW_TASK_CONNECT_TIMEOUT=10
FEIGN_SLOW_TASK_READ_TIMEOUT=172800
FEIGN_OK_HTTP_WRITE_TIMEOUT=600
FEIGN_OK_HTTP_MAX_IDLE_CONNECTION=200
FEIGN_OK_HTTP_KEEP_ALIVE_DURATION=50
FEIGN_CLIENT_CACHE_MAX_NUM_SIZE=1024

# SCP timeouts (seconds)
SCP_WAIT_TIME=43200
SCP_DEFAULT_CMD_WAIT_TIME=600
SCP_CONNECT_TIMEOUT=30
SCP_SERVER_ALIVE=60

# Thread pool
CMD_CORE_POOL_SIZE=8
CMD_CORE_MAX_POOL_SIZE=100
CMD_MAX_POOL_SIZE=200
CMD_MAX_QUEUE_SIZE=500

# RabbitMQ event bus
rmq_host=192.168.1.100
rmq_port=5672
rmq_vhost=cloudMsgHost
rmq_exchange=cloud_vm_exchange_direct
rmq_queue=cas_vm_event_nova_compute
rmq_user=cloud
rmq_password=Cl@oud13

# Heartbeat / keepalive
heartbeat_interval=30
heartbeat_timeout=120

# libvirt
libvirt_uri=qemu:///system

# Storage
local_storage_path=/vms/images
nfs_mount_path=/mnt/nfs

# Network
ovs_bridge=vswitch0
ovs_dpdk_enabled=false
vxlan_port=4789

# API retry
api_retry_count=10
