# H3C CAS CVK Agent Configuration
# Original: /etc/cvk/cvk_agent.conf
# Recovered from R0785P03 cvk-agent.package and Feign client config

# Feign HTTP client timeouts
feign.connect.timeout=10
feign.read.timeout=600
feign.slow.task.connect.timeout=10
feign.slow.task.read.timeout=172800
feign.okhttp.write.timeout=600

# Thread pool (Java Feign client)
cmd.core.pool.size=8
cmd.core.max.pool.size=100
cmd.max.pool.size=200
cmd.max.queue.size=500

# SCP transport timeouts
scp.wait.time=43200
scp.default.cmd.wait.time=600
scp.connect.timeout=30
scp.server.alive=60

# CVM Connection
cvm.host=${CVM_HOST:-localhost}
cvm.port=${CVM_PORT:-8080}
cvm.scheme=http

# CVK Agent Identity
cvk.agent.port=${CVK_AGENT_PORT:-26165}
cvk.host.id=${CVK_HOST_ID:-host-001}
cvk.host.name=${CVK_HOST_NAME:-cvk-node-1}

# Monitoring ports
mon.frontend.server.port=20041
mon.backend.server.port=20044
ha.frontend.server.port=20043
ha.backend.server.port=20042
mon.fdt.server.port=20100

# CVD daemon (storage)
cvd.ds.port=8192

# VNC base port
vnc.base.port=5900

# OCFS2 agent
ocfs2.agent.port=9099

# USB daemon
usbdemd.port=10060
