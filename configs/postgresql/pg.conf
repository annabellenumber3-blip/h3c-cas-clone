# PostgreSQL Configuration for H3C CAS vservice database
# Original: /etc/database/pg.conf
# Recovered from R0785P03 front.package/database/pg.conf
# Key settings only — full original has 796 lines of comments

listen_addresses = '*'
port = 5432
max_connections = 500
password_encryption = md5
shared_buffers = 128MB
dynamic_shared_memory_type = posix
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'seasql-%a.log'
log_rotation_age = 1d
log_truncate_on_rotation = on
max_wal_size = 1GB
min_wal_size = 80MB
