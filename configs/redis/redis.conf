# Redis Configuration for H3C CAS
# Original: /etc/redis/redis.conf
# Recovered from R0785P03 front.package/redis/redis.conf

bind 0.0.0.0
port 6379
requirepass Sy@Redi$79
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Connection
timeout 300
tcp-keepalive 60
maxclients 10000

# Logging
loglevel notice
logfile ""

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128
