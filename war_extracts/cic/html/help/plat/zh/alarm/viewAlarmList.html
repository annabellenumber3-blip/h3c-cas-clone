<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493681208"></a><a name="topic_m210821x0_282a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看告警配置列表</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>中已存在的告警配置。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>告警管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>告警配置</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入告警配置列表页面。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>云资源：云资源的名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>邮件通知模板：云资源配置的邮件通知模板名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>短信通知模板：云资源配置的短信通知模板名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作：以图标的方式显示操作员可以对告警配置执行的管理操作，点击图标后相应的操作会生效。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_173"><span lang=EN-US><img border=0 width=11 height=11 id="图片 3110" src="../images/m210821x0z2/x_Img_x_png_173.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示修改告警配置。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_174"><span lang=EN-US><img border=0 width=11 height=12 id="图片 3111" src="../images/m210821x0z2/x_Img_x_png_174.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示下发告警配置。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_175"><span lang=EN-US><img border=0 width=10 height=9 id="图片 3112" src="../images/m210821x0z2/x_Img_x_png_175.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示删除告警配置。</span><span lang=EN-US><a name="topic_m210821x0_282b"></a></span></p></li></ul>
