<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493681240"></a><a name="topic_m210821x0_286a"></a><span style='font-family:"微软雅黑","sans-serif"'>下发告警配置</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于将告警配置下发至云资源。下发操作完成后，系统才会通过邮件或短信发送云资源的告警信息给用户。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>告警管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>告警配置</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入告警配置列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击告警配置对应的操作列</span><a name="x_Img_x_png_178"><span lang=EN-US><img border=0 width=17 height=19 id="图片 3115" src="../images/m210821x0z2/x_Img_x_png_178.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出下发告警配置确认对话框。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span><a name="topic_m210821x0_286b"></a></p></li></ol>
