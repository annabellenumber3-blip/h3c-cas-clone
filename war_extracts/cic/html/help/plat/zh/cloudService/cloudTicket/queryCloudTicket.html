<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493605337"></a><a name="topic_m210821x0_272a"></a><span style='font-family:"微软雅黑","sans-serif"'>查询工单</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于操作员通过选择工单状态，查询符合过滤条件的工单信息。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>流程管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>工单</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入工单列表信息页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击状态对应的下拉框，选择状态，在用户列表中将会显示符合该状态的工单信息。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>状态：工单处理的状态（包括：全部、未处理、已处理）。</span><a name="topic_m210821x0_272b"></a></p></li></ul>
