<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493681787"></a><a name="topic_m210821x0_302a"></a><span style='font-family:"微软雅黑","sans-serif"'>删除自定义监控面板</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于删除已经创建自定义监控面板。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>监控管理</span><span lang=EN-US>/&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>自定义监控</span><span lang=EN-US>&gt;]</span><span style='font-family:"微软雅黑","sans-serif"'>，进入自定义监控页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击自定义监控面板右上角的</span><a name="x_Img_x_png_190"><span lang=EN-US><img border=0 width=12 height=10 id="图片 3125" src="../images/m210821x0z2/x_Img_x_png_190.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出删除自定义监控面板确认对话框，单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span><a name="topic_m210821x0_302b"></a></p></li></ol>
