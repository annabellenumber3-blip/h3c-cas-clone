<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493681962"></a><a name="topic_m210821x0_325a"></a><span style='font-family:"微软雅黑","sans-serif"'>访问策略管理</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>访问策略定义了操作员的访问控制信息。管理员可通过引用访问控制策略来限制操作员是否可以登录</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>。当访问策略被操作员引用后，访问策略限制才会生效。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>主要功能</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span class=Reference-R0G144B200></span><u><span lang=EN-US><a href="../sysMgmt/accessStrategy/accessStrategyList.html#_Ref493683022"><u><span style='font-family:"微软雅黑","sans-serif"'>查看访问策略列表</span></u></a></span></u></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span class=Reference-R0G144B200></span><u><span lang=EN-US><a href="../sysMgmt/accessStrategy/accessStrategyAdd.html#_Ref493683031"><u><span style='font-family:"微软雅黑","sans-serif"'>增加访问策略</span></u></a></span></u></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span class=Reference-R0G144B200></span><u><span lang=EN-US><a href="../sysMgmt/accessStrategy/accessStrategyModify.html#_Ref493683036"><u><span style='font-family:"微软雅黑","sans-serif"'>修改访问策略</span></u></a></span></u></p></li></ul>
