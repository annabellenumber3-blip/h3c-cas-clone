<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492973126"></a><a name="topic_m210821x0_109a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看资源池列表</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>中已存在的全部资源池。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>资源池管理</span><span lang=EN-US>&gt;]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入资源池列表页面。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>类型：资源池使用云资源的类型。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>组织：使用资源池的组织。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span lang=EN-US>CPU</span><span style='font-family:"微软雅黑","sans-serif"'>：资源池的</span><span lang=EN-US>CPU</span><span style='font-family:"微软雅黑","sans-serif"'>数量。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>内存：资源池的内存容量。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>存储：资源池存储容量。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作：以图标的方式显示操作员可以对资源池执行的管理操作，点击图标后相应的操作会生效。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_31"><span lang=EN-US><img border=0 width=11 height=11 id="图片 30" src="../images/m210821x0z2/x_Img_x_png_31.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示修改资源池。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_32"><span lang=EN-US><img border=0 width=11 height=11 id="图片 31" src="../images/m210821x0z2/x_Img_x_png_32.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示删除资源池。</span><span lang=EN-US><a name="topic_m210821x0_109b"></a></span></p></li></ul>
