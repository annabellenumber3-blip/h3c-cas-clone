<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492634757"></a><a name="topic_m210821x0_370a"></a><span style='font-family:"微软雅黑","sans-serif"'>系统辅助功能</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>系统辅助功能是</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>提供的与系统操作相关的配置功能。</span></p>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>系统辅助功能的配置主要包括：</span></p>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><u><span lang=EN-US><a href="../assistMgmt/sysAssistMgmt.html#_Ref493684022"><u><span style='font-family:"微软雅黑","sans-serif"'>辅助管理</span></u></a></span></u><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>：提供与配置界面及后台任务和消息相关的功能。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><u><span lang=EN-US><a href="../assistMgmt/task/sysTask.html#_Ref493684028"><u><span style='font-family:"微软雅黑","sans-serif"'>任务台</span></u></a></span></u><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>：用于跟踪和记录自操作员登录成功以来的管理操作任务执行状态。</span><span lang=EN-US><a name="topic_m210821x0_370b"></a></span></p></li></ul>
