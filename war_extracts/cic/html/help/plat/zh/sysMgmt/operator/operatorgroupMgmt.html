<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493681925"></a><a name="topic_m210821x0_305a"></a><span style='font-family:"微软雅黑","sans-serif"'>操作员及分组管理</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于管理</span><span lang=EN-US>CVM</span><span style='font-family:"微软雅黑","sans-serif"'>中的操作员、操作员分组和在线操作员。</span></p>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><u><span lang=EN-US><a href="../../sysMgmt/operator/operatorMgmt.html#_Ref493682251"><u><span style='font-family:"微软雅黑","sans-serif"'>操作员管理</span></u></a></span></u><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>：为系统提供身份验证功能，只有合法的操作员才能进入系统。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><u><span lang=EN-US><a href="../../sysMgmt/operatorGroup/operatorGroupMgmt.html#_Ref493682265"><u><span style='font-family:"微软雅黑","sans-serif"'>操作员分组管理</span></u></a></span></u><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>：对操作员的操作权限进行细化分组，便于操作员的权限管理。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><u><span lang=EN-US><a href="../../sysMgmt/operatorOnline/operatorOnlineMgmt.html#_Ref493682275"><u><span style='font-family:"微软雅黑","sans-serif"'>在线操作员管理</span></u></a></span></u><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>：对正在执行配置管理工作的操作员进行快速查询和强制下线。</span><span lang=EN-US><a name="topic_m210821x0_305b"></a></span></p></li></ul>
