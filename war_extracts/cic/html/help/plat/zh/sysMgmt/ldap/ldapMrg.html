<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493681999"></a><a name="topic_m210821x0_339a"></a><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>用户同步配置</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>操作员通过</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>用户同步配置功能，可以在</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>中配置连接</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器，并进行用户信息同步操作。</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>与</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器连接成功后，操作员需要通过配置</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>同步策略，将</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器指定的</span><span lang=EN-US>BASE DN</span><span style='font-family:"微软雅黑","sans-serif"'>中的用户同步到组织中。在配置</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>同步策略时，操作员可以根据具体需求选择不同的同步方式。与此同时，</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>还提供了将指定的</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器中的用户属性手工筛选后导出的功能。</span></p>
