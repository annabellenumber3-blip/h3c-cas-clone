<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493682953"></a><a name="topic_m210821x0_323a"></a><span style='font-family:"微软雅黑","sans-serif"'>立即下线操作员</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能可以使当前在线的操作员立即下线。被下线的操作员需要重新登录才能使用</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>系统管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>操作员管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>在线操作员</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入在线操作员列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>在列表中选中需要立即下线的操作员，单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>立即下线</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮，弹出立即下线在线操作员确认对话框。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>注意事项</span></h2>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>当前操作员具有立即下线的操作权限时，才能执行立即下线在线操作员操作。</span><span lang=EN-US><a name="topic_m210821x0_323b"></a></span></p>
