<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493682936"></a><a name="topic_m210821x0_321a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看在线操作员列表</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>中当前在线的操作员信息。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>系统管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>操作员管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>在线操作员</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入在线操作员列表页面。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>登录名：操作员登录</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>使用的帐号。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作员姓名：操作员的姓名。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作员分组：操作员所属的操作员分组。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>登录时间：操作员本次登录</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>的开始时间。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>登录地址：操作员登录</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>所使用的计算机</span><span lang=EN-US>IP</span><span style='font-family:"微软雅黑","sans-serif"'>地址。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>会话</span><span lang=EN-US>ID</span><span style='font-family:"微软雅黑","sans-serif"'>：操作员本次登录</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>的会话编号。</span><a name="topic_m210821x0_321b"></a></p></li></ul>
