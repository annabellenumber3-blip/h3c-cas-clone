<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493683983"></a><a name="topic_m210821x0_369a"></a><span style='font-family:"微软雅黑","sans-serif"'>注册</span><span lang=EN-US>License</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于将申请的</span><span lang=EN-US>License</span><span style='font-family:"微软雅黑","sans-serif"'>激活文件导入到</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>，启动授权功能。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>系统管理</span><span lang=EN-US>/License</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入</span><span lang=EN-US>License</span><span style='font-family:"微软雅黑","sans-serif"'>详细信息页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>注册</span><span lang=EN-US>License&gt;</span><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>按钮，弹出注册</span><span lang=EN-US>License</span><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>对话框。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>浏览</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮，选择需要导入到</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>的</span><span lang=EN-US>License</span><span style='font-family:"微软雅黑","sans-serif"'>文件，单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>打开</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮。</span></p></li></ol>

<ol start="4" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>按钮注册</span><span lang=EN-US>License</span><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>文件。</span><span lang=EN-US><a name="topic_m210821x0_369b"></a></span></p></li></ol>
