<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493681989"></a><a name="topic_m210821x0_332a"></a><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>备份配置管理</span></h1>

<p class=MsoNormal><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>备份配置管理实现了自动备份和手动备份</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>数据和配置文件的功能，同时提供了查看备份历史，并下载备份历史数据的功能，以及利用历史备份数据对当前的</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>系统进行数据和配置文件的还原。</span></p>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>自动备份是通过设置备份频率和执行时间，系统周期性对</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>数据和配置文件进行自动备份；手动备份是指手动触发对</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>数据和配置文件进行备份，操作步骤配置方法请参见</span><u><span lang=EN-US><a href="../../sysMgmt/cicbackupconfig/backup.html#_Ref493683127"><u>CIC</u><u><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'><span lang=EN-US>备份配置</span></span>‌</u></a></span></u><span style='font-family:"微软雅黑","sans-serif"'>。</span></p>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span class=Reference-R0G144B200></span><u><span lang=EN-US><a href="../../sysMgmt/cicbackupconfig/backuphistoylist.html#_Ref493683153"><u><span style='font-family:"微软雅黑","sans-serif"'>查看备份历史列表</span></u></a></span></u></p></li></ul>
