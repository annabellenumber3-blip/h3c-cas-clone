<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492973636"></a><a name="topic_m210821x0_127a"></a><span style='font-family:"微软雅黑","sans-serif"'>删除组织</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于删除指定的组织。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>组织管理</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入组织列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击组织对应的操作列</span><a name="x_Img_x_png_43"><span lang=EN-US><img border=0 width=13 height=15 id="图片 5609" src="../images/m210821x0z2/x_Img_x_png_43.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出删除组织确认对话框。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>注意事项</span></h2>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>当组织中存在用户或用户分组时，不允许删除该组织。删除组织之前，请先删除组织中的用户和用户分组。</span><span lang=EN-US><a name="topic_m210821x0_127b"></a></span></p>
