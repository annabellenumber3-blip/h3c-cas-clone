<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492973732"></a><a name="topic_m210821x0_168a"></a><span style='font-family:"微软雅黑","sans-serif"'>组织的用户分组管理</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>在</span><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>中，用户分组是组织中使用虚拟机的最终用户分组，也是组织的重要组成部分。一个组织创建完成后，组织管理员需要先为其增加用户或者用户分组。当一个虚拟机分配给用户分组使用后，该分组中的全部最终用户都可以使用该虚拟机。通过组织对应的用户分组列表，组织管理员可以对组织中的所有最终用户分组进行管理。</span></p>
