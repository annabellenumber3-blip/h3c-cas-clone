<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492975952"></a><a name="topic_m210821x0_172a"></a><span style='font-family:"微软雅黑","sans-serif"'>为组织增加用户分组</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于为指定的组织增加最终用户分组。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>组织管理</span><span lang=EN-US>/&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>组织名称</span><span lang=EN-US>&gt;]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入该组织的概要信息页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>选择“用户分组”页签，进入该组织的用户分组列表页面。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击列表右上方的</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>增加用户分组</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮，弹出增加用户分组对话框。</span></p></li></ol>

<ol start="4" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>输入分组名和分组描述。</span></p></li></ol>

<ol start="5" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>父分组：显示为“</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>”，表示当前用户分组为父分组。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>组织：用户分组所属的组织。</span><a name="topic_m210821x0_172b"></a></p></li></ul>
