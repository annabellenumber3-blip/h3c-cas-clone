<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492971106"></a><a name="topic_m210821x0_97a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看云硬盘列表</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看云硬盘列表。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>云服务</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>云硬盘</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，将显示云硬盘列表页面。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>名称：云硬盘名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>状态：云硬盘状态。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>路径：云硬盘对应的存储在主机的挂载路径。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>容量：云硬盘容量。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>组织：云硬盘用户所属的组织。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>应用云主机：应用云硬盘的云主机的名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>用户：使用云硬盘的用户名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作：以图标的方式显示可以对某个云硬盘的权限的管理操作，点击图标后相应的操作会生效。</span><a name="x_Img_x_png_29"><span lang=EN-US><img border=0 width=11 height=11 id="图片 25" src="../images/m210821x0z2/x_Img_x_png_29.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标表示删除云硬盘。</span><a name="topic_m210821x0_97b"></a></p></li></ul>
