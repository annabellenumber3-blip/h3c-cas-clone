<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492657597"></a><a name="topic_m210821x0_5a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看云资源列表</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看系统中所有云资源的概要信息。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>云资源</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入云资源列表页面。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>类型：云资源的类型（</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源）。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span lang=EN-US>IP</span><span lang=EN-US style='font-family: "微软雅黑","sans-serif"'>地址：云资源的</span><span lang=EN-US>IP</span><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>地址。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>用户名：连接云资源所使用的用户名。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作：以图标的方式显示操作员可以对云资源执行的管理操作，点击图标后相应的操作会生效。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_1"><span lang=EN-US><img border=0 width=9 height=10 id="图片 8" src="../images/m210821x0z2/x_Img_x_png_1.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示修改云资源。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_2"><span lang=EN-US><img border=0 width=9 height=10 id="图片 9" src="../images/m210821x0z2/x_Img_x_png_2.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示删除云资源。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_3"><span lang=EN-US><img border=0 width=7 height=9 id="图片 10" src="../images/m210821x0z2/x_Img_x_png_3.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示查看云资源。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_4"><span lang=EN-US><img border=0 width=9 height=9 id="图片 12" src="../images/m210821x0z2/x_Img_x_png_4.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示授权云资源。</span><span lang=EN-US><a name="topic_m210821x0_5b"></a></span></p></li></ul>
