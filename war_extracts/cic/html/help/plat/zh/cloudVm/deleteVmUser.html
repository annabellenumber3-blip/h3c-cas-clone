<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492970539"></a><a name="topic_m210821x0_80a"></a><span style='font-family:"微软雅黑","sans-serif"'>删除使用云主机的用户</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户分组</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于删除用户或用户分组使用某个云主机的权限。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>云服务</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>云主机</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入云主机列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>显示用户</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户分组</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮，可在页面下方显示用户</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户分组列表。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>在云主机列表选择虚拟机，在用户</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户分组列表将显示有权限使用该云主机的用户</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户组。点击操作列</span><a name="x_Img_x_png_24"><span lang=EN-US><img border=0 width=11 height=13 id="图片 20" src="../images/m210821x0z2/x_Img_x_png_24.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出删除权限确认对话框，单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span><a name="topic_m210821x0_80b"></a></p></li></ol>
