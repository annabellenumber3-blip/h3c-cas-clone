<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492970570"></a><a name="topic_m210821x0_82a"></a><span style='font-family:"微软雅黑","sans-serif"'>暂停云主机</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于暂停处于“运行”状态的云主机。云主机暂停时，内存中的数据仍保留在内存中，虚拟机处于停止运行状态。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>云服务</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>云主机</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入云主机列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>选择云主机，单击鼠标右键选择</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>暂停</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项或单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>更多操作</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮选择</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>暂停</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，弹出暂停虚拟机确认对话框。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>注意事项</span></h2>

<p class=MsoNormal><span lang=EN-US>vCenter</span><span style='font-family: "微软雅黑","sans-serif"'>云主机没有暂停功能。</span><span lang=EN-US><a name="topic_m210821x0_82b"></a></span></p>
