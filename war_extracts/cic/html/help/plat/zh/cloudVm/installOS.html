<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492970689"></a><a name="topic_m210821x0_93a"></a><span style='font-family:"微软雅黑","sans-serif"'>为云主机安装操作系统</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于为新创建的已启动的云主机安装操作系统。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>云服务</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>云主机</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入云主机列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>右键单击云主机选择</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>控制台</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，弹出虚拟桌面窗口。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>在虚拟桌面窗口中，单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>虚拟光驱</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮，挂载本地镜像文件，为云主机安装操作系统。</span><a name="topic_m210821x0_93b"></a></p></li></ol>
