<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492976413"></a><a name="topic_m210821x0_190a"></a><span style='font-family:"微软雅黑","sans-serif"'>最终用户分组管理</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>用户分组是多个用户的集合，每一个分组又可以配置多级子分组。不同的子分组可以具有不同的访问权限，但属于同一个分组或子分组的用户具有相同的访问权限。操作员通过用户分组管理功能可以增加、修改和删除用户分组</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>子分组，还可以查看用户分组的详细信息。</span></p>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>相同分组</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>子分组的用户登录</span><span lang=EN-US>CAS</span><span style='font-family:"微软雅黑","sans-serif"'>用户自助服务门户，可以使用本分组</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>子分组的虚拟机资源。</span></p>
