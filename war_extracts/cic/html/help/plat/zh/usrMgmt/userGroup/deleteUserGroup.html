<div class=WordSection1 style='layout-grid:15.6pt'>


<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492976638"></a><a name="topic_m210821x0_195a"></a><span style='font-family:"微软雅黑","sans-serif"'>删除用户分组</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>子分组</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于删除指定的用户分组或者子分组。删除用户分组之前，请确保用户分组中不包含子分组，否则将无法删除。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户分组</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入用户分组列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>对于父分组，点击用户分组对应的操作列</span><a name="x_Img_x_png_104"><span lang=EN-US><img border=0 width=9 height=10 id="图片 53" src="../../images/m210821x0z2/x_Img_x_png_104.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出删除用户分组确认对话框；对于子分组，点击父分组名称前的</span><a name="x_Img_x_png_105"><span lang=EN-US><img border=0 width=7 height=10 id="图片 54" src="../../images/m210821x0z2/x_Img_x_png_105.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标展开其子分组，点击用户子分组对应的操作列</span><a name="x_Img_x_png_106"><span lang=EN-US><img border=0 width=9 height=10 id="图片 55" src="../../images/m210821x0z2/x_Img_x_png_106.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出删除用户分组确认对话框。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>注意事项</span></h2>

<p class=MsoNormal><span lang=EN-US>CIC</span><span style='font-family:"微软雅黑","sans-serif"'>不允许直接删除包含子分组的用户分组，需要先删除子分组，然后才能删除用户分组。</span><span lang=EN-US><a name="topic_m210821x0_195b"></a></span></p>
