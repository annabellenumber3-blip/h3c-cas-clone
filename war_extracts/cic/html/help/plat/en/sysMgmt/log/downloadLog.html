<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493860963"></a><a name="_topic_m210821x0_345_title"></a><a name="topic_m210821x0_345a"></a><span lang=EN-US>Download operation logs</span></h1>

<p class=MsoNormal><span lang=EN-US>Perform this task to download operation
logs.</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span lang=EN-US>Procedure</span></h2>

<ol start="1" style="margin: 0; padding-left:1.5cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 17px;"><span lang=EN-US>From the left navigation pane, select System &gt; Operation Logs.</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.5cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 17px;"><span lang=EN-US>Click Download.</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.5cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 17px;"><span lang=EN-US>In the dialog box that opens, click OK.<a name="topic_m210821x0_345b"></a></span></p></li></ol>
