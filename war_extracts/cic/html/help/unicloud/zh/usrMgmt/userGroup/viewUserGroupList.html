<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492976607"></a><a name="topic_m210821x0_191a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看用户分组列表</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看当前</span><span lang=EN-US>ISC</span><span style='font-family:"微软雅黑","sans-serif"'>平台中的用户分组信息。用户分组列表中将会显示当前操作员可以管理的全部用户分组，包括父分组及其子分组。操作员可以通过点击父分组名称前的</span><a name="x_Img_x_png_93"><span lang=EN-US><img border=0 width=11 height=15 id="图片 40" src="../../images/m210821x0z2/x_Img_x_png_93.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，来查看其下级子分组。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户分组</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入用户分组列表页面。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>分组名：用户分组的名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>组织：用户分组所属的组织。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作：以图标形式显示了可对最终用户分组进行的操作。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_94"><span lang=EN-US><img border=0 width=11 height=12 id="图片 469" src="../../images/m210821x0z2/x_Img_x_png_94.png" alt=31.png></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示增加子分组。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_95"><span lang=EN-US><img border=0 width=11 height=12 id="图片 5" src="../../images/m210821x0z2/x_Img_x_png_95.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示修改分组。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_96"><span lang=EN-US><img border=0 width=11 height=12 id="图片 471" src="../../images/m210821x0z2/x_Img_x_png_96.png" alt=10.png></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示删除分组。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_97"><span lang=EN-US><img border=0 width=11 height=13 id="图片 7" src="../../images/m210821x0z2/x_Img_x_png_97.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示查看分组信息。</span><span lang=EN-US><a name="topic_m210821x0_191b"></a></span></p></li></ul>
