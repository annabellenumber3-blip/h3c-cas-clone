<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492976647"></a><a name="topic_m210821x0_196a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看用户分组详细信息</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看指定用户分组的详细信息。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户分组</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入用户分组列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>对于父分组，点击用户分组对应的操作列</span><a name="x_Img_x_png_107"><span lang=EN-US><img border=0 width=10 height=11 id="图片 56" src="../../images/m210821x0z2/x_Img_x_png_107.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出查看用户分组对话框；对于子分组，点击父分组名称前的</span><a name="x_Img_x_png_108"><span lang=EN-US><img border=0 width=7 height=9 id="图片 57" src="../../images/m210821x0z2/x_Img_x_png_108.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标展开其子分组，点击用户子分组对应的操作列</span><a name="x_Img_x_png_109"><span lang=EN-US><img border=0 width=10 height=11 id="图片 58" src="../../images/m210821x0z2/x_Img_x_png_109.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出查看用户分组对话框。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>父分组：用户分组的上一级分组。如果此处显示为“</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>”，表示当前用户分组为父分组。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>分组名：用户分组的名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>组织：用户分组所属的组织。</span><a name="topic_m210821x0_196b"></a></p></li></ul>
