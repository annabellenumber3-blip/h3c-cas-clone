<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492973517"></a><a name="topic_m210821x0_122a"></a><span style='font-family:"微软雅黑","sans-serif"'>删除资源池的虚拟交换机</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于删除指定资源池中的虚拟交换机，即删除资源池使用该虚拟交换机的权限，但不会将该虚拟交换机从</span><span lang=EN-US>ISC</span><span style='font-family:"微软雅黑","sans-serif"'>中删除。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>资源池管理</span><span lang=EN-US>/&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>资源池名称</span><span lang=EN-US>&gt;]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入该资源池的概要信息页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>选择“虚拟交换机”页签，进入该资源池的虚拟交换机列表页面。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击虚拟交换机对应的操作列</span><a name="x_Img_x_png_38"><span lang=EN-US><img border=0 width=15 height=15 id="图片 5605" src="../images/m210821x0z2/x_Img_x_png_38.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出删除虚拟交换机确认对话框。</span></p></li></ol>

<ol start="4" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮，完成操作。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>注意事项</span></h2>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>资源池中至少存在一个虚拟交换机，当资源池只剩最后一个虚拟交换机时，不允许删除。</span><span lang=EN-US><a name="topic_m210821x0_122b"></a></span></p>
