<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492978474"></a><a name="topic_m210821x0_234a"></a><span style='font-family:"微软雅黑","sans-serif"'>简单查询云主机电子流</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于在云主机电子流列表中选择云主机电子流的状态，查询相应的云主机电子流。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>流程管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>云主机电子流</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入云主机电子流列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击列表左上方的“状态”下拉框，选择需要查询的云主机电子流状态，在云主机电子流列表中将会显示符合过滤条件的云主机电子流信息。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>状态：云主机电子流的状态（包括：待处理、通过、拒绝、撤销、部署成功、部署失败、删除成功、删除失败、全部，默认为待处理）。</span><a name="topic_m210821x0_234b"></a></p></li></ul>
