<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492971243"></a><a name="topic_m210821x0_103a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看云资源防病毒配置详细信息</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看</span><span lang=EN-US>VMS</span><span style='font-family:"微软雅黑","sans-serif"'>及其管理的</span><span lang=EN-US>VKS</span><span style='font-family:"微软雅黑","sans-serif"'>主机安装的防病毒包的具体信息。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>云服务</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>云安全</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>防病毒</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入防病毒列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击云资源名称前的</span><a name="x_Img_x_png_30"><span lang=EN-US><img border=0 width=16 height=16 id="图片 26" src="../images/m210821x0z2/x_Img_x_png_30.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出查看防病毒对话框。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>云资源名称：云资源的名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>防病毒厂商：主机已安装的防病毒补丁包所属的软件厂商。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>补丁包目录：防病毒补丁包的目录。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>补丁包名称：防病毒补丁包的名称。</span><a name="topic_m210821x0_103b"></a></p></li></ul>
