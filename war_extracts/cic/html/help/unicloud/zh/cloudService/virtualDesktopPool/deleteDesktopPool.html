<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492977332"></a><a name="topic_m210821x0_201a"></a><span style='font-family:"微软雅黑","sans-serif"'>删除虚拟桌面池</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于删除指定的虚拟桌面池。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>虚拟桌面池</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入虚拟桌面池列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击虚拟桌面池对应的操作列</span><a name="x_Img_x_png_114"><span lang=EN-US><img border=0 width=13 height=15 id="图片 64" src="../../images/m210821x0z2/x_Img_x_png_114.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出删除虚拟桌面池确认对话框。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>注意事项</span></h2>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>如果虚拟桌面池中存在虚拟机，则不允许删除该虚拟桌面池。</span><span lang=EN-US><a name="topic_m210821x0_201b"></a></span></p>
