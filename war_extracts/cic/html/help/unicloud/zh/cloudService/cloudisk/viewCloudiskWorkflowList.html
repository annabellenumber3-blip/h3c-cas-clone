<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493604020"></a><a name="topic_m210821x0_247a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看云硬盘电子流列表</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看系统中所有云硬盘电子流的概要信息。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>流程管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>云硬盘电子流</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入云硬盘电子流列表信息页面。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>云硬盘名称：最终用户申请云硬盘的名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>用户姓名：最终用户的姓名。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>状态：审批电子流的状态（包括：待审批、通过、拒绝、不存在、审批中、待实施）。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>容量：最终用户申请云硬盘的容量。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作：以图标的方式显示操作员可以对云硬盘电子流执行的管理操作，点击图标后相应的操作会生效。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><span lang=EN-US> <a name="x_Img_x_png_141"><img border=0 width=11 height=11 id="图片 23" src="../../images/m210821x0z2/x_Img_x_png_141.png"></a></span><span style='font-family:"微软雅黑","sans-serif"'>表示处理云硬盘电子流。</span></p></li></ul>
