<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493605330"></a><a name="topic_m210821x0_271a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看工单列表</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看工单的概要信息。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>流程管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>工单</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入工单列表信息页面。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>用户姓名：发送工单消息的最终用户。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>标题：工单的标题。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>内容：工单的内容。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>状态：工单回复的状态（包括：未处理、已处理）。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>发送时间：最终用户发送工单的时间。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作：以图标的方式显示操作员可以对工单执行的管理操作，点击图标后相应的操作会生效。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_161"><span lang=EN-US><img border=0 width=15 height=15 src="../../images/m210821x0z2/x_Img_x_png_161.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示处理工单。</span></p></li></ul>
