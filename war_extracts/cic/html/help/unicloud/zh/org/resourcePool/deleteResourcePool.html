<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492975504"></a><a name="topic_m210821x0_159a"></a><span style='font-family:"微软雅黑","sans-serif"'>删除组织的资源池</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能主要用于删除组织中的资源池。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>组织管理</span><span lang=EN-US>/&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>组织名称</span><span lang=EN-US>&gt;]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入该组织概要信息页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>选择“资源池”页签，进入该组织的资源池列表页面。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击资源池名称的</span><a name="x_Img_x_png_64"><span lang=EN-US><img border=0 width=14 height=16 id="图片 460" src="../../images/m210821x0z2/x_Img_x_png_64.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出删除资源池确认对话框，单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span><a name="topic_m210821x0_159b"></a></p></li></ol>
