<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492975861"></a><a name="topic_m210821x0_169a"></a><span style='font-family:"微软雅黑","sans-serif"'>查看组织的用户分组信息</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于查看指定组织中所有的最终用户分组信息。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>组织管理</span><span lang=EN-US>/&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>组织名称</span><span lang=EN-US>&gt;]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入该组织的概要信息页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>选择“用户分组”页签，进入该组织的用户分组页面。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>分组名：用户分组的名称。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>操作：以图标的方式显示操作员可对组织中的用户分组进行的管理操作。点击图标后相应的操作会生效。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_73"><span lang=EN-US><img border=0 width=11 height=12 id="图片 3134" src="../../images/m210821x0z2/x_Img_x_png_73.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示增加子分组。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_74"><span lang=EN-US><img border=0 width=11 height=12 id="图片 3135" src="../../images/m210821x0z2/x_Img_x_png_74.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示修改分组。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_75"><span lang=EN-US><img border=0 width=11 height=12 id="图片 458" src="../../images/m210821x0z2/x_Img_x_png_75.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示删除分组。</span></p></li></ul>

<ul style="list-style-type: circle; margin: 0; padding-left:2.6cm; font-size: 16pt;"><li><p class=ItemList2 style="text-indent:0cm; margin-left:0cm; padding-left: 14px;"><a name="x_Img_x_png_76"><span lang=EN-US><img border=0 width=13 height=12 id="图片 3133" src="../../images/m210821x0z2/x_Img_x_png_76.png"></span></a><span lang=EN-US style='font-family:"微软雅黑","sans-serif"'>表示查看分组信息。</span><span lang=EN-US><a name="topic_m210821x0_169b"></a></span></p></li></ul>
