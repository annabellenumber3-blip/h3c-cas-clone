<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>组织是由虚拟化资源池构成的基于物理平台的虚拟数据中心。一个组织包括虚拟化后的逻辑资源、最终用户、虚拟机、虚拟机模板、组织管理员和组织管理策略等。组织可以是企业私有云内部的一个业务部门，也可以是运营商公有云的外部客户。</span></p>
