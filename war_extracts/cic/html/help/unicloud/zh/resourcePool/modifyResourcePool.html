<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492973139"></a><a name="topic_m210821x0_111a"></a><span style='font-family:"微软雅黑","sans-serif"'>修改资源池</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于修改指定的资源池信息。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[VDC</span><span style='font-family:"微软雅黑","sans-serif"'>管理</span><span lang=EN-US>/&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>资源池管理</span><span lang=EN-US>&gt;]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入资源池列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击资源池对应的操作列</span><a name="x_Img_x_png_33"><span lang=EN-US><img border=0 width=11 height=11 id="图片 5600" src="../images/m210821x0z2/x_Img_x_png_33.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出修改资源池对话框。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>修改资源池的描述信息，选择虚拟机备份存储池，并根据需要选择是否允许使用本地存储。</span></p></li></ol>

<ol start="4" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>检查并确认配置后，单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>参数说明</span></h2>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>资源池名称：资源池的名称，不可修改。</span></p></li></ul>

<ul style="list-style-type: disc; margin: 0; padding-left:1.7cm; font-size: 14pt;font-family:sans-serif;"><li><p class=ItemList style="text-indent:0cm; margin-left:0cm; padding-left: 14px; line-height:150%;"><span style='font-family:"微软雅黑","sans-serif"'>描述：资源池的描述信息。</span><span lang=EN-US><a name="topic_m210821x0_111b"></a></span></p></li></ul>
