<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493682265"></a><a name="topic_m210821x0_313a"></a><span style='font-family:"微软雅黑","sans-serif"'>操作员分组管理</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>操作员分组是多个操作员的集合，每一个分组又可以配置多级子分组。不同的子分组可以具有不同的访问权限，但属于同一个分组或子分组的操作员具有相同的访问权限。系统提供的缺省分组包括系统管理员组、组织管理员组和安全审计员组。</span></p>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>不同分组</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>子分组的操作员登录到</span><span lang=EN-US>ISC</span><span style='font-family:"微软雅黑","sans-serif"'>之后，默认只能查看和操作本分组</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>子分组内的资源。</span></p>
