<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref493683408"></a><a name="topic_m210821x0_346a"></a><span style='font-family:"微软雅黑","sans-serif"'>检测</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器连接</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于检测</span><span lang=EN-US>ISC</span><span style='font-family:"微软雅黑","sans-serif"'>与指定</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器的连接状态。如果连接不成功，将提示</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器连接失败，请检查服务器配置是否正确。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>系统管理</span><span lang=EN-US>/LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>用户同步配置</span><span lang=EN-US>/LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器配置</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击指定</span><span lang=EN-US>LDAP</span><span style='font-family:"微软雅黑","sans-serif"'>服务器对应的操作列</span><a name="x_Img_x_png_224"><span lang=EN-US><img border=0 width=11 height=10 id="图片 3096" src="../../../images/m210821x0z2/x_Img_x_png_224.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，检测连接状态。</span><a name="topic_m210821x0_346b"></a></p></li></ol>
