<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492657690"></a><a name="topic_m210821x0_11a"></a><span style='font-family:"微软雅黑","sans-serif"'>授权</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于授权</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源给其它管理员分组。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>云资源</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，进入云资源列表页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源对应的操作列</span><a name="x_Img_x_png_9"><span lang=EN-US><img border=0 width=11 height=11 id="图片 14" src="../images/m210821x0z2/x_Img_x_png_9.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，弹出资源授权管理对话框。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>点击授权管理分组输入框对应的</span><a name="x_Img_x_png_10"><span lang=EN-US><img border=0 width=10 height=12 id="图片 15" src="../images/m210821x0z2/x_Img_x_png_10.png"></span></a><span style='font-family:"微软雅黑","sans-serif"'>图标，选择要授权的分组，单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮。</span></p></li></ol>

<ol start="4" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮，完成</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源授权操作。</span><a name="topic_m210821x0_11b"></a></p></li></ol>
