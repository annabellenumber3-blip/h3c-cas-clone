<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492915626"></a><a name="_topic_m210821x0_66_title"></a><a name="topic_m210821x0_66a"></a><span style='font-family:"微软雅黑","sans-serif"'>关闭</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源虚拟机</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于在</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源中关闭处于“运行”状态的虚拟机，即关闭虚拟机的操作系统。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>云资源</span><span lang=EN-US>/&lt;vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源</span><span lang=EN-US>&gt;]</span><span style='font-family:"微软雅黑","sans-serif"'>，进入云资源概要信息页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>选择“虚拟机”页签，进入</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源的虚拟机列表页面。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>右键单击虚拟机，选择</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>安全关闭</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，弹出关闭虚拟机确认对话框。</span></p></li></ol>

<ol start="4" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span></p></li></ol>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>注意事项</span></h2>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>在关闭虚拟机之前，虚拟机将自动保存系统的数据。</span><span lang=EN-US><a name="topic_m210821x0_66b"></a></span></p>
