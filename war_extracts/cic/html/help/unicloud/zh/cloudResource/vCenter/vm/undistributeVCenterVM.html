<div class=WordSection1 style='layout-grid:15.6pt'>


<h1 style='margin-left:0cm;text-indent:0cm'><a name="_Ref492915686"></a><a name="_topic_m210821x0_425_title"></a><a name="topic_m210821x0_425a"></a><span style='font-family:"微软雅黑","sans-serif"'>取消分配</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源虚拟机</span></h1>

<p class=MsoNormal><span style='font-family:"微软雅黑","sans-serif"'>该功能用于在</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源中将指定的虚拟机取消分配组织中的用户或者用户分组。</span></p>

<h2 style='margin-left:0cm;text-indent:0cm'><span style='font-family:"微软雅黑","sans-serif"'>操作步骤</span></h2>

<ol start="1" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>单击导航树中</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>云资源</span><span lang=EN-US>/&lt;vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>资源</span><span lang=EN-US>&gt;]</span><span style='font-family:"微软雅黑","sans-serif"'>，进入云资源概要信息页面。</span></p></li></ol>

<ol start="2" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>选择“虚拟机”页签，进入</span><span lang=EN-US>vCenter</span><span style='font-family:"微软雅黑","sans-serif"'>云资源的虚拟机列表页面。</span></p></li></ol>

<ol start="3" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>右键单击虚拟机，选择</span><span lang=EN-US>[</span><span style='font-family:"微软雅黑","sans-serif"'>取消分配虚拟机</span><span lang=EN-US>]</span><span style='font-family:"微软雅黑","sans-serif"'>菜单项，弹出分配虚拟机对话框。</span></p></li></ol>

<ol start="4" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>选择要取消分配的组织</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户</span><span lang=EN-US>/</span><span style='font-family:"微软雅黑","sans-serif"'>用户分组。</span></p></li></ol>

<ol start="5" style="margin: 0; padding-left:1.66cm; font-family: Arial; font-size: 10.5pt;"><li><p class=ItemStep style="text-indent:0cm; margin-left:0cm; padding-left: 16px;"><span style='font-family:"微软雅黑","sans-serif"'>在取消分配虚拟机对话框中，单击</span><span lang=EN-US>&lt;</span><span style='font-family:"微软雅黑","sans-serif"'>确定</span><span lang=EN-US>&gt;</span><span style='font-family:"微软雅黑","sans-serif"'>按钮完成操作。</span><a name="topic_m210821x0_425b"></a></p></li></ol>
