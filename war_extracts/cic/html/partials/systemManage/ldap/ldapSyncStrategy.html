<!-- LDAP同步策略配置 -->
<div class="cas-panel" ng-controller="ldapSyncStrategyCtrl">
	<div class="panel-heading cas-panel-heading">
		<ol class="breadcrumb">
		   <li><a ui-sref='main.systemMng' ><span translate="systemMng.systemMng"></span></a></li>
		   <li><a ui-sref='main.ldapUserSync' ><span translate="ldap.ldapUserSync"></span></a></li>
           <li class="active"><span translate="ldap.ldapSyncStrategy"></span></li>
		</ol>
		<span class="glyphicon glyphicon-question-sign link-help" custom-title="{{::'help'|translate}}"
			aria-hidden="true" ng-click="openHelp('sysMgmt/ldap/ldapSyncConfig/ldapSyncConfigMrg')"></span>
	</div>
	
	<div class="panel-body" content-style>
		<nav class="navbar-default" role="navigation">
		    <div class="container-fluid">
				<div class="btn-group navbar-right" style='margin-right: -14px;' >
					<label class="btn btn-default btn-menu hidden-xs"  ng-click="refreshList()">
					    <span class='sm-icon icon-refresh'></span>
				        <span translate="common.refresh"></span>
			        </label>
					<label class="btn btn-default btn-menu hidden-xs"  has-permission="LDAP_CONFIG_ADD" ng-click="addStrategy()" >
						<span class="sm-icon icon-add"></span>
						<span translate="ldap.addStrategy"></span>
					</label>
				</div>
	        </div>
        </nav>
		<div class="cas-list-body oneList-calc">
			<div id="ldapSyncStrategyId" list-style class="table"  ng-grid="gridOptions"></div>
		</div>
	</div>
	
	
</div>
