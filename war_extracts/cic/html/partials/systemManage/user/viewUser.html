<!-- 查看用户 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <button type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('usrMgmt/user/viewUserDetail')">
		<span class="icon-helpnew"></span>
	</button>

    <h4 class="modal-title" translate="user.viewUser"></h4>
</div>
<div class="modal-body modal-detail">
	<div class="description">
		<div class="detail-item">
			<dl  class="dl-horizontal">
				<dt style="width:45%;" translate="common.loginName"></dt><dd custom-title short-width=240 str-fontsize=12 shortcut cut-str="{{::entry.loginName}}">{{::entry.loginName}}</dd>
				<dt style="width:45%;" translate="user.authentication"></dt><dd custom-title short-width=240 str-fontsize=12 shortcut cut-str="{{::entry.authMode}}">{{::entry.authMode}}</dd>
				<dt style="width:45%;" translate="user.userName"></dt><dd custom-title short-width=240 str-fontsize=12 shortcut cut-str="{{::entry.userName}}">{{::entry.userName}}</dd>
				<dt style="width:45%;" translate="user.idNumber"></dt><dd custom-title short-width=240 str-fontsize=12 shortcut cut-str="{{::entry.idNumber}}">{{::entry.idNumber}}</dd>
				<dt style="width:45%;" translate="user.email"></dt><dd custom-title short-width=240 str-fontsize=12 shortcut cut-str="{{::entry.email}}">{{::entry.email}}</dd>
				<dt style="width:45%;" translate="user.organization"></dt><dd custom-title short-width=240 str-fontsize=12 shortcut cut-str="{{::entry.organization}}">{{::entry.organization}}</dd>
				<dt style="width:45%;" translate="user.phone"></dt><dd custom-title short-width=240 str-fontsize=12 shortcut cut-str="{{::entry.phone}}">{{::entry.phone}}</dd>
				<dt style="width:45%;" translate="user.mailingAddress"></dt><dd custom-title short-width=240 str-fontsize=12 shortcut cut-str="{{::entry.mailingAddress}}">{{::entry.mailingAddress}}</dd>
				<dt style="width:45%;" translate="user.userGroup"></dt><dd custom-title short-width=240 str-fontsize=12 shortcut cut-str="{{::entry.userGroup}}">{{::entry.userGroup}}</dd>
			</dl>
		</div>
	</div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <button class="btn btn-black" ng-click="cancel()" translate="common.close"></button>
</div>
