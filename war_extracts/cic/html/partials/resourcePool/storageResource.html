<div class="overview-col-full" style="height:100%; min-height:100px;" ng-controller="storageResource" >
     <carousel class="hide-indicators original-carousel" interval="myInterval" style="margin-right:15px; height:140px; min-height:140px">
       <slide ng-repeat="i in slideArray">
           <div ng-repeat="line in i.value" class="inline" style="float:left;width:13.5%;height:140px" >
		        <div ng-if="line.addType == null" id="{{line.id}}" cascheckbox class="cas-checkbox labeled-btn radio" style="width:calc(100% - 10px); margin-left:10px; float:left;" ng-model="selectModel.model" value={{line}} false-value=null ng-style="{'margin-left': slideArray.length == 1 ? '-10px' : '30px'}">
		            <input name="selectedVm" type="radio"  ng-checked="isSelected(line.id)">
		            <div class="box poolBox" style="display:block; text-align: center;width:calc(100%);height:105px;" ng-style="{'margin-top': '0px'}">
		              <div style="width:100%;height:70%;">
			                <span style="margin:10px">
	                            <img  id="img{{line.id}}" style="margin-left:calc((100% - 60px)/2); width:60px;height:60px;" class="pic2" src="css/img/gray/Icon_storage_green_16x16.svg">
			                </span>
			              <div style="margin-left:60px;" ng-if="hasModifyPermission" ng-click="delStorage(line)" >
	                            <span style="text-align: left" class="drxvm_recyble" custom-title="{{::'common.delete'|translate}}">
	                               <img  src="css/img/Icon_auto_recycle_16x16.svg">
	                            </span>
	                        </div>
                       </div>
                       <div style="background-color:#EBEBEB;height:30%;">
	                       <!-- 名称 -->
	                       <div style="position:relative; top:7px;">
	                       <span style="text-align: center;font-weight:bold;" shortcut custom-title cut-str="{{line.title}}" short-width="100"></span><br/>
                            </div>
                        </div>                     
                        <span ng-if="isSelected(line.id)" style="position:absolute; top:100%; left:calc(50% - 10px); width: 0px; height: 0px; border-left:10px solid rgba(0,0,0,0); border-top: 10px dashed #436bb3; border-right: 10px solid rgba(0,0,0,0)"></span>
                    </div>
		        </div>
		        
		        <div ng-if="hasModifyPermission && line.addType != null" cascheckbox class="cas-checkbox labeled-btn radio" style="width:calc(100% - 10px); margin-left:10px; float:left;" ng-model="selectModel.model" value={{line}} false-value=null ng-style="{'margin-left': slideArray.length == 1 ? '-10px' : '30px'}" >
		            <div  ng-click="addStorage()" class="box poolBox" style="display:block; text-align: center;width:calc(100%);height:105px;" ng-style="{'margin-top': '0px'}">
		              <div style="width:100%;height:70%;">
			                <span style="margin:10px">
			                    <img style="margin-left:calc((100% - 80px)/2); width:80px;height:80px;" class="pic2" src="css/img/green/Icon_add.svg">
			                </span>
                       </div>
                    </div>
		        </div>
		    </div>       
       </slide>
     </carousel>

	<div style="height:calc(100% - 139px); overflow-y: auto;">
		<div class="description-new col-xs-12 col-sm-6 col-md-6 col-lg-4" style="padding:0 10px 10px 0; height:50%">
			<div class="detail-item" style="min-height:225px;">
				<div class="title" style="height:29px"><!--height:29px 解决420pxie ff浏览器展现问题  -->
					<h5 translate="common.basicAttribute"></h5>
				</div>
				<dl class="dl-horizontal dl-wide" style="margin-bottom:0">
					<dt translate="common.displayName"></dt>
					<dd ng-bind="storage.name"></dd>
					<dt translate="common.type"></dt>
					<dd ng-bind="storage.type"></dd>
					<dt translate="resourcePool.totalStorage"></dt>
					<dd ng-bind="storage.totalStorage"></dd>
					<dt translate="resourcePool.activalStorage"></dt>
					<dd ng-bind="storage.activalStorage"></dd>
					<dt translate="host.useCapability"></dt>
					<dd ng-bind="storage.useCapability"></dd>
					<dt ng-if="params.type==2" translate="resourcePool.preStorage"></dt>
					<dd ng-if="params.type==2" ng-bind="storage.preStorage"></dd>
					<dt ng-if="params.type==2" translate="resourcePool.storageScale"></dt>
					<dd ng-if="params.type==2" ng-bind="storage.storageScale"></dd>
					<dt translate="report.storageRate"></dt>
					<dd>
				    	<summary-progress-bar rate="storage.storageRate"></summary-progress-bar>
				    </dd>
				</dl>
	  	     </div>
	    </div> 
	    
		<div class="overviewheight-host  col-xs-12 col-sm-6 col-md-6 col-lg-4" style="padding:0 10px 10px 0px; height:50%; min-height:235px;" >
			<div class="detail-item" style="padding-bottom:5px;min-height:225px;">
				<div class="title">
					<h5 translate="resourcePool.orgStorage"></h5>
				</div>
				<div id="orgChart" class="trendChart" ></div>
			</div>
		</div>
		<div class="overviewheight-host  col-xs-12 col-sm-6 col-md-6 col-lg-4" style="padding: 0 10px 10px 0;height:50%; min-height:235px;">
			<div class="detail-item" style="padding-bottom:5px;min-height:225px;">
				<div class="title">
					<h5 translate="resourcePool.vmStorage"></h5>
				</div>
				<div id="vmChart" class="trendChart" ></div>
			</div>
		</div>
		
		<!-- CAS -->
		<div ng-if="params.cloudType == 2" class="overviewheight-host  col-xs-12 col-sm-6 col-md-6 col-lg-6" style="padding:0 10px 10px 0px; height:50%; min-height:235px;" >
			<div class="detail-item" style="padding-bottom:5px;min-height:225px;">
				<div class="title">
					<h5 translate="board.ioInfoTitle"></h5>
				</div>
				<div id="ioChart" class="trendChart" ></div>
			</div>
		</div>
		<div ng-if="params.cloudType == 2" class="overviewheight-host  col-xs-12 col-sm-6 col-md-6 col-lg-6" style="padding: 0 10px 10px 0;height:50%; min-height:235px;">
			<div class="detail-item" style="padding-bottom:5px;min-height:225px;">
				<div class="title">
					<h5 translate="board.diskIOPSTitle"></h5>
				</div>
				<div id="iopsChart" class="trendChart" ></div>
			</div>
		</div>
		<!-- VMware -->
		<div ng-if="params.cloudType == 3" class="overviewheight-host  col-xs-12 col-sm-6 col-md-6 col-lg-6" style="padding:0 10px 10px 0px; height:50%; min-height:235px;" >
			<div class="detail-item" style="padding-bottom:5px;min-height:225px;">
				<div class="title">
					<h5 translate="resourcePool.usedStorage"></h5>
	</div>
				<div line-chart chart-name={{storage.name}} url="{{vmwareDatastoreUsed}}" hide-legend=true color-index=4 y-axis="value"
				     grid-y2="30" style='width: 100%; height: 195px;' id="vmwareDatastoreUsedChart" no-query-first="true">
					<div class="altStyle" style="padding-left:294px;padding-top:80px;" translate="common.noData"></div>
				</div>
			</div>
		</div>
		<div ng-if="params.cloudType == 3" class="overviewheight-host  col-xs-12 col-sm-6 col-md-6 col-lg-6" style="padding: 0 10px 10px 0;height:50%; min-height:235px;">
			<div class="detail-item" style="padding-bottom:5px;min-height:225px;">
				<div class="title">
					<h5 translate="resourcePool.provisionedStorage"></h5>
				</div>
				<div line-chart chart-name={{storage.name}} url="{{vmwareDatastoreProvisioned}}" hide-legend=true color-index=2 y-axis="value"
					 grid-y2="30" style='width: 100%; height: 195px;' id="vmwareDatastoreProvisionedChart" no-query-first="true">
					<div class="altStyle" style="padding-left:294px;padding-top:80px;" translate="common.noData"></div>
				</div>
			</div>
		</div>
		
	</div>
</div>
