<!-- 趋势分析 -->
<div class="panel cas-panel panel-default" ng-controller="trendAnalysisCtrl" id="trendAnalysis">
    <div class="panel-heading cas-panel-heading">
        <ol class="breadcrumb" style="display: inline;">
            <li><a ui-sref='main.monitorMng' ><span translate="monitorMng.monitorMng"></span></a></li>
            <li class="active"><span translate="monitorMng.trendAnalysis"></li>
        </ol>
        <!-- <span class="glyphicon glyphicon-question-sign link-help" custom-title="{{::'help'|translate}}"
            aria-hidden="true" ng-click="openHelp('sysMgmt/sysMgmt')"></span> -->
    </div>
    <div class="panel-body" id="trendAnalysisPanel">
        <div class="calc100">
			<div class="row overview-content-row">
			    <form name="form" style="padding:10px 0px 0px 30px;" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
                    <!-- 资源池 -->
	                <div class="form-group" style="width:900px;">
	                    <label for="currentrespool_name" class="control-label short">
	                       <span translate="report.respool"></span>
	                    </label>
	                    <div class="col-sm-4" ng-click="selectRespool()">
	                        <div class="input-group" style="width: 200px;">
	                            <input type="text" class="form-control first-child-angle" ng-model="currentrespool.name" id="currentrespool_name" name="currentrespool_name">
	                            <span class="input-group-addon inner-addon"><span class="icon-search-gray"></span> </span>
	                        </div>
	                    </div>
	                    <div class="btn-group">
                            <label class="btn btn-default btn-menu hidden-xs"  ng-click="queryReport()">
                                <span class='sm-icon icon-search'></span>
                                <span translate="common.query"></span>
                            </label>
                            <label class="btn btn-default btn-menu hidden-xs" ng-click="searchReset()">
                                <span class='sm-icon icon-reset'></span>
                                <span translate="common.reset"></span>
                            </label>
                        </div>
                    </div>
	            </form>
				<div ng-repeat="resourcePool in resourcePools" id="resourcePoolTrend{{$index}}" class="rowDashboard" style="min-height: 270px; min-width: 1100px;">
					<hr style="margin-top: {{$index != 0 ? '20px' : '0px'}};">
					<h4 class="dashboardh4">{{resourcePool.name}}</h4>
					<div id="resourcePoolCpuMemTrend{{$index}}" class="square-dashboard-49" style="height: calc(100% - 25px); height: -moz-calc(100% - 25px); height: -webkit-calc(100% - 25px);">
					      <h4 translate="monitorMng.computingResourceInfoTrend"></h4>
		                  <div id="hostCpuMem{{resourcePool.id}}" class="trendChart"></div>
					</div>
					<div id="resourcePoolStorageTrend{{$index}}" class="square-dashboard-49" style="height: calc(100% - 25px); height: -moz-calc(100% - 25px); height: -webkit-calc(100% - 25px);">
					     <h4 translate="monitorMng.storageResourceInfoTrend"></h4>
					     <div id="storage{{resourcePool.id}}" class="trendChart"></div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
