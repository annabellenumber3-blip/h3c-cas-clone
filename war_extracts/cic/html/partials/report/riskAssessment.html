<!-- 风险评估 -->
<div class="panel cas-panel panel-default" ng-controller="riskAssessmentCtrl" id="riskAssessment">
    <div class="panel-heading cas-panel-heading">
        <ol class="breadcrumb" style="display:inline;">
            <li><a ui-sref='main.monitorMng' ><span translate="monitorMng.monitorMng"></span></a></li>
            <li class="active"><span translate="monitorMng.riskAssessment"></li>
        </ol>
        <!-- <span class="glyphicon glyphicon-question-sign link-help" custom-title="{{::'help'|translate}}"
            aria-hidden="true" ng-click="openHelp('sysMgmt/sysMgmt')"></span> -->
    </div>
    <div class="panel-body" id="riskAssessmentPanel">
        <div class="calc100">
			<div class="row overview-content-row">
			    <form name="form" style="padding:10px 0px 0px 30px; margin-bottom: 10px;" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
			        <div class="form-group" style="width: 900px; margin-bottom: 0px;">
			            <!-- 资源池 -->
			            <label for="currentrespool_name" class="control-label short">
			                 <span translate="report.respool">
			            </label>
			            <div class="col-sm-4">
			                 <div class="input-group" style="width: 200px;" ng-class="{disable: (model.topNum)}" ng-click="model.topNum ? '' : selectRespool()">
			                     <input type="text" class="form-control first-child-angle selectInput" ng-readonly="true" ng-model="currentrespool.name" id="currentrespool_name" name="currentrespool_name">
			                     <span class="input-group-addon inner-addon"><span class="icon-search-gray"></span> </span>
			                 </div>
			            </div>
			            <!-- TopN-->
			            <label for="inputhalevel" class="control-label short">
			                 <span>TopN</span>
			            </label>
			            <div class="col-sm-4" style="height: 0px;">
			                 <div style="width: 200px;" ng-class="{disable: (currentrespool.id)}">
			                     <select-input class="" options="levels.topNOptions" bind-model="model.topNum" input-readonly="{{currentrespool.id ? true : false}}" input-id="inputhalevel" input-name="halevel">
			                     </select-input>
			                 </div>
			            </div>
			            <div class="btn-group" style="float: right; margin-right: -5px;">
                            <label class="btn btn-default btn-menu hidden-xs"  ng-click="queryReport()">
                                <span class='sm-icon icon-search'></span>
                                <span translate="common.query"></span>
                            </label>
                            <label class="btn btn-default btn-menu hidden-xs" ng-click="searchReset()">
                                <span class='sm-icon icon-reset'></span>
                                <span translate="common.reset"></span>
                            </label>
                        </div>
			        </div>
			    </form>
			    <div class="rowDashboard" style="min-height: 270px; min-width: 1100px;">
			         <div ng-repeat="resourcePool in resourcePools" id="resourcePoolRisk{{$index}}" class="square-dashboard-24">
			               <h4>{{resourcePool.name}}</h4>
			                  <div class="dashBoard_countPic" id="riskAssessmentPic{{resourcePool.id}}">
			                  </div>
			                  <div class="dashBoard_countTable">
			                      <table class="dashBoard_table" >
			                          <tr><td class="name" translate="monitorMng.cpuResourceSurplusDays"></td><td class="leftText" id="cpuResourceSurplusDays{{resourcePool.id}}"></td></tr>
			                          <tr><td class="name" translate="monitorMng.memResourceSurplusDays"></td><td class="leftText" id="memResourceSurplusDays{{resourcePool.id}}"></td></tr>
			                          <tr><td class="name" translate="monitorMng.storageResourceSurplusDays"></td><td class="leftText" id="storageResourceSurplusDays{{resourcePool.id}}"></td></tr>
			                      </table>
			                  </div>
			             </div>
			    </div>
			</div>
		</div>
    </div>
</div>
