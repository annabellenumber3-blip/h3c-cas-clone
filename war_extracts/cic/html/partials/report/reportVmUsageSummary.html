<!-- 虚拟机使用量报表汇总 -->
<div class="cas-panel" ng-controller="vmUsageSummaryQueryCtrl">
    <div class="panel-heading cas-panel-heading">
        <ol class="breadcrumb" style="display:inline;">
        	<li><a ui-sref='main.monitorMng' ><span translate="monitorMng.monitorMng"></span></a></li>
            <li><a ui-sref='main.reportMng' ><span translate="report.reportMng"></span></a></li>
            <li class="active" translate="report.vmUsageSummary"></li>
        </ol>
         <span class="glyphicon glyphicon-question-sign link-help" custom-title="{{::'help'|translate}}"
            aria-hidden="true" ng-click="openHelp('moniterMgmt/vmUsageSummaryReport')"></span> 
    </div>
    <div class="panel-body" content-style>
        <div class="section">
      </div>
        <nav class="navbar-default" role="navigation">
            <div class="container-fluid">
                <div class="btn-group navbar-right" style='margin-right: -14px;' >
                    <label class="btn btn-default btn-menu hidden-xs"  ng-click="refreshList()">
                        <span class='sm-icon icon-refresh'></span>
                        <span translate="common.refresh"></span>
                    </label>
<!--                    <label> -->
<!--                         <input class="form-control" id="navbarInput-01" type="search" placeholder="Search"> -->
<!--                    </label> -->
                    <label class="btn btn-default btn-menu hidden-xs"  ng-click="advancedQuery()" >
                        <span class="sm-icon icon-advanced"></span>
                        <span translate="common.advancedQuery"></span>
                    </label>
                        <label class="btn btn-default btn-menu hidden-xs" ng-click="printOrExportList(0)">
                        <span class='sm-icon glyphicon glyphicon-print'></span>
                        <span translate="common.print"></span>
                    </label>
                    <div class="btn btn-default btn-menu hidden-xs" dropdown dropdown-toggle>
                      <span class="sm-icon icon-exportfile"></span>
                      <span translate="common.export"></span>
                      <span class="dropdown-toggle icon-xialahao" type="button"></span>
                      <ul class="dropdown-menu" style="min-width:0px;" role="menu">
                        <li><a href="#" ng-click="printOrExportList(2)"><span class="sm-icon icon-excel"></span><span translate="common.exportExcel"></span></a></li>
                        <li><a href="#" ng-click="printOrExportList(1)"><span class="sm-icon icon-pdf"></span><span translate="common.exportPdf"></span></a></li>
                      </ul>
                    </div>
                    
                </div>
            </div>
        </nav>
        <div class="cas-list-body oneList-calc">
            <div id="vmUsageSummaryId" list-style class="table"  ng-grid="gridOptions"></div>
        </div>
    </div>
</div>
