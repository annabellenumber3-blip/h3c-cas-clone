<!-- 存储资源容量 -->
<div class="panel cas-panel panel-default" ng-controller="storageResCapacityCtrl" id="storageResCapacity">
    <div class="panel-heading cas-panel-heading">
        <ol class="breadcrumb" style="display:inline;">
            <li><a ui-sref='main.monitorMng' ><span translate="monitorMng.monitorMng"></span></a></li>
            <li class="active"><span translate="monitorMng.storageResCapacity"></li>
        </ol>
         <span class="glyphicon glyphicon-question-sign link-help" custom-title="{{::'help'|translate}}"
            aria-hidden="true" ng-click="openHelp('moniterMgmt/storageResCapacity')"></span> 
    </div>
    <div class="panel-body calc100" id="storageResCapacityPanel">
        <div class="row overview-content-row">
            <form name="form" style="padding:10px 0px 0px 30px; margin-bottom: 10px;" class="form-horizontal" role="form" novalidate>
				<div class="form-group" style="margin-bottom: 0px;width:900px;">
                	<!-- 资源池 -->
					<label for="resourcePool_name" class="control-label  short"><span translate="report.respool"></span><span class="required">*</span></label>
					<div class="col-sm-4" ng-click="selectRespool()">
						<div class = "input-group " style="width: 200px;">
							<input type="text" class="form-control first-child-angle" ng-model="resourcePool.name" id="resourcePool_name" name="resourcePool_name" required>
							<span class="input-group-addon inner-addon"><span class="icon-search-gray"></span> </span>
						</div>
					</div>
					<!-- 存储-->
					<label for="storagePool_name" class="control-label  short"><span translate="host.storagePool"></span></label>
					<div class="col-sm-4" style="height: 0px;" ng-click="selectStoragePool()">
						<div class = "input-group " style="width: 200px;">
							<input type="text" class="form-control first-child-angle" ng-model="storagePool.name" id="storagePool_name" name="storagePool_name" required>
							<span class="input-group-addon inner-addon"><span class="icon-search-gray"></span> </span>
						</div>
					</div>
	                <div class="btn-group" style="float: right; margin-right: -5px;">
	                    <label class="btn btn-default btn-menu hidden-xs"  ng-click="queryStorageResCapacity()">
	                        <span class='sm-icon icon-search'></span>
	                        <span translate="common.query"></span>
	                    </label>
	                    <label class="btn btn-default btn-menu hidden-xs" ng-click="searchReset()">
	                         <span class='sm-icon icon-reset'></span>
	                         <span translate="common.reset"></span>
	                    </label>
	                </div>
				</div>
            </form>
            <div class="rowDashboard" style="min-width:1100px;">            
				<div ng-repeat="storagePool in storagePools" class="square-dashboard-24">
					<h4 translate="monitorMng.storageRate"></h4>
					<div id="ringChart{{$index}}" class="trendChart"></div>
					
				</div>
            </div>
		</div>
    </div>
</div>
