<div class="cas-panel" ng-controller="resPoolStorageCtrl" id="resPoolStorageReport">
	<div class="panel-heading cas-panel-heading">
		<ol class="breadcrumb" style="display:inline;">
			<li><a ui-sref='main.monitorMng' ><span translate="monitorMng.monitorMng"></span></a></li>
			<li><a ui-sref='main.reportMng' ><span translate="report.reportMng"></span></a></li>
			<li class="active"><span translate="report.respoolStorage"></li>
		</ol>
		<span class="glyphicon glyphicon-question-sign link-help" custom-title="{{::'help'|translate}}"
			aria-hidden="true" ng-click="openHelp('moniterMgmt/storageResCapacity')"></span>
	</div>
	<div class="panel-body">		
		<!-- 查询条件 -->
			<div class="calc100">
				<div class="row overview-content-row" style="overflow-x:hidden;">
					<form name="form"  style="padding:10px 0px 0px 30px;" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
						<div class="form-group" style="width:900px;">
							<!-- 存储-->
							<label for="currentstorage_name" class="control-label  short"><span translate="host.storagePool"></span></label>
							<div class="col-sm-4" ng-click="selectStorage()">
								<div class = "input-group " style="width: 200px;">
									<input type="text" class="form-control first-child-angle" ng-model="currentstorage.name" custom-title="{{currentstorage.name}}" id="currentstorage_name" name="currentstorage_name" required>
									<span class="input-group-addon inner-addon"><span class="icon-search-gray"></span> </span>
								</div>
							</div>
							
							<!-- 统计周期-->
							<label for="cycle" class="col-sm-1 control-label  short"><span translate="report.statisticalPeriod"></span> </label>
							<div class="col-sm-4" >
								<div style="width: 200px;">
									<select-input class="" options="levels.cycleOptions" bind-model="model.cycle" id = "cycle" input-id="cycle" input-name="cycle"></select-input>
								</div>
							</div>
						</div>
						
						<div class="form-group" style="width:1200px;">
							
							<!-- 开始时间-->
							<label for="storageReportStartTime" class="col-sm-1 control-label short"><span translate="cloudResource.startTime"></span></label>
							<div class="col-sm-3">
								<div class="input-group date input-large" style="width: 200px;" date-cell="#storageReportStartTime" jes-date is-time="{{isShowTime}}" format="{{dateFmt}}" is-clear="false" is-today="false" max-date="model.endTime" ng-model="model.startTime">
	                                <input id="storageReportStartTime" class="form-control selectInput first-child-angle calendar-input-img" type="text" readonly ng-model="model.startTime">
	                             </div>
							</div>
							<!-- 结束时间-->
							<label for="storageReportEndTime" class="col-sm-1 control-label short"><span translate="cloudResource.endTime"></span></label>
							<div class="col-sm-2" style="margin-right:50px;">
								<div class="input-group date input-large" style="width: 200px;" date-cell="#storageReportEndTime" jes-date is-time="{{isShowTime}}" format="{{dateFmt}}" is-clear="false" is-today="false" min-date="model.startTime" max-date="tomTime" ng-model="model.endTime">
	                                <input id="storageReportEndTime" class="form-control selectInput first-child-angle calendar-input-img" type="text" readonly ng-model="model.endTime">
	                             </div>
							</div>
							<div class="btn-group">
								<label class="btn btn-default btn-menu hidden-xs"  ng-click="queryStorageReport()">
									<span class='sm-icon icon-search'></span>
									<span translate="common.query"></span>
								</label>
								<label class="btn btn-default btn-menu hidden-xs" ng-click="searchReset()">
									<span class='sm-icon icon-reset'></span>
									<span translate="common.reset"></span>
								</label>
								<label class="btn btn-default btn-menu hidden-xs" ng-click="exportReportPdf()">
									<span class='sm-icon icon-exportfile'></span>
									<span translate="common.export"></span>
								</label>
							</div>
						</div>
						
					</form>
					<div class="container-fluid">
						<div class="demo-container" ng-repeat="storage in storageData" ng-if="storage!='__proto__'">
							<div id="storageReport{{$index}}" class="demo-placeholder"></div>
						</div>
						<div class="demo-container" ng-if="showNoData == true">
							<div id="storageReport" class="demo-placeholder"></div>
					</div>
				</div>
			</div>
	</div>
	</div>
</div>
