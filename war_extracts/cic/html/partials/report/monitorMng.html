<!-- 监控管理面板 -->
<div class="panel panel-default cas-panel">
    <div class="panel-heading cas-panel-heading">
        <ol class="breadcrumb">
            <li class="active" translate="monitorMng.monitorMng"></li>
        </ol>
         <span class="glyphicon glyphicon-question-sign link-help" custom-title="{{::'help'|translate}}"
            aria-hidden="true" ng-click="openHelp('moniterMgmt/moniterMgmt')"></span> 
    </div>
    <div class="panel-body">
        <div class="section">
            <div class='lead' >
              <span class="pic Icon_monitor_manage Icon_common_display">
              </span>
              <span class='desc'><span class="lead-text-align"  translate="monitorMng.monitorMngHead"></span></span>
            </div>
         </div>
         <div class="panel-body">
             <a ui-sref='main.reportMng' class="dashboard-box" has-permission="REPORT_MNG">
                 <span class="custom-picture Icon_report_manage Icon_common_display" ></span>
                 <span class="box-title" text="{{::'report.reportMng'|translate}}"><span translate="report.reportMng"></span></span>
             </a>
             <a ui-sref='main.performanceMonitor' class="dashboard-box" has-permission="REPORT_CUSTOM_MONITOR_MNG">
                 <span class="custom-picture Icon_cloud_monitor Icon_common_display" ></span>
                 <span class="box-title" text="{{::'cloudMonitor.performanceMonitor'|translate}}"><span translate="cloudMonitor.performanceMonitor"></span></span>
             </a>
         </div>
    </div>
</div>
