<!-- 统计报表 -->
<div class="panel panel-default cas-panel">
	<div class="panel-heading cas-panel-heading">
		<ol class="breadcrumb">
			<li><a ui-sref='main.monitorMng' ><span translate="monitorMng.monitorMng"></span></a></li>
			<li class="active"><span translate="report.reportMng"></li>
		</ol>
		<span class="glyphicon glyphicon-question-sign link-help" custom-title="{{'help'|translate}}"
			aria-hidden="true" ng-click="openHelp('moniterMgmt/monitorReportMgmt')"></span>
	</div>

	<div class="panel-body">
		<div class="section">
			<div class='lead' >
		      	<span class="pic Icon_report_manage Icon_common_display">
		      	</span>
		      	 <span class='desc' ><span translate="report.reportPrompt"/></span></span>
		    </div>
		</div>
	    <div class="panel-body">
 			<!-- 资源池计算资源使用统计 -->
			<a ui-sref='main.resPoolCompute' class="dashboard-box" has-permission="REPORT_RESPOOL_COMPUTE_MNG"> 
				<span class="custom-picture Icon_common_display Icon_report_respool_compute" ></span>
				<span class="box-title" text="{{::'report.respoolCompute'|translate}}"><span shortcut cut-str="{{::'report.respoolCompute'|translate}}" short-width="150" custom-title></span></span>
			</a>
			<!-- 资源池资源使用统计 -->
			<a  ui-sref="main.resPoolStorage" class="dashboard-box" has-permission="REPORT_RESPOOL_STORAGE_MNG"> 
				<span class="custom-picture Icon_common_display Icon_report_respool_storage"></span>
				<span class="box-title" text="{{::'report.respoolStorage'|translate}}"><span shortcut cut-str="{{::'report.respoolStorage'|translate}}" short-width="150" custom-title></span></span>
			</a>
			<!-- 组织资源配额使用审计 -->
			<a ui-sref="main.orgResQuota" class="dashboard-box" has-permission="REPORT_ORG_QUOTA_MNG"> 
				<span class="custom-picture Icon_common_display Icon_report_orgres_quota" ></span>
				<span class="box-title" text="{{::'report.orgResQuota'|translate}}"><span shortcut cut-str="{{::'report.orgResQuota'|translate}}" short-width="150" custom-title></span></span>
			</a>
			<!-- 虚拟机使用量报表明细 -->
            <a ui-sref="main.vmUsage" class="dashboard-box" has-permission="REPORT_USEAGE_VM_MNG"> 
                <span class="custom-picture Icon_common_display Icon_vm_resource_report" ></span>
                <span class="box-title" text="{{::'report.vmUsage'|translate}}"><span shortcut cut-str="{{::'report.vmUsage'|translate}}" short-width="150" custom-title></span></span>
            </a>
            <!-- 虚拟机使用量报表汇总 -->
            <a ui-sref="main.vmUsageSummary" class="dashboard-box" has-permission="REPORT_USEAGE_VM_SUMMARY_MNG"> 
                <span class="custom-picture Icon_common_display Icon_vm_resource_summary_report" ></span>
                <span class="box-title" text="{{::'report.vmUsageSummary'|translate}}"><span shortcut cut-str="{{::'report.vmUsageSummary'|translate}}" short-width="150" custom-title></span></span>
            </a>
		</div>
	</div>
	
</div>
