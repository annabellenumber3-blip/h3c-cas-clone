<!-- vmware主机池概要 -->
<div class='row overview-content-row' ng-controller=vmwareDCSummaryController>
    <div class="description-new overviewheight overview-desc col-xs-12 col-sm-6 col-md-6 col-lg-4">
		<div class="detail-item">
			<div class="title">
				<h5 translate="common.basicAttribute"></h5>
			</div>
			<dl class="dl-horizontal dl-wide" style="margin-bottom:0">
				<dt translate="host.host"></dt>
				<dd ng-bind="summary.hostNum"></dd>
				
				<dt translate="cloudResource.cpuTotalCore"></dt>
				<dd ng-bind="summary.cpuTotal"></dd>
				
				<dt translate="cloudResource.totalMemory"></dt>
				<dd ng-bind="summary.memoryTotal | byteUnitRender2"></dd>
				
				<dt translate="vmware.totalStorage"></dt>
				<dd ng-bind="summary.capacityTotal | byteUnitRender2"></dd>
				
				<dt translate="vmware.totalAvailStorage"></dt>
				<dd ng-bind="summary.freeSpaceTotal | byteUnitRender2"></dd>
				
				<dt translate="board.vm"></dt>
				<dd>
					<span class="span_padding" ng-bind="summary.vmTotal"></span>
					<span class="span_padding">[</span>
					<span class="span_padding"><img class="pic1img" src="css/img/gray/Icon_vm_running.svg"></img></span>
					<span class="span_padding span_color_green" ng-bind="summary.runningVmTotal"></span>
					<span class="span_padding"><img class="pic1img" src="css/img/gray/Icon_vm_close.svg"></img></span>
					<span class="span_padding span_color_red" ng-bind="summary.offVmTotal"></span>
					<span class="span_padding">]</span>
				</dd>
				
				<dt translate="cloudResource.vmDensity"></dt>
				<dd ng-bind="summary.vmPerHost | number:2"></dd>
			</dl>
  	     </div>
	</div> 
	<div class="overviewheight hostcpuTop5 col-xs-12 col-sm-6 col-md-6 col-lg-4" >
		<!-- top5主机CPU-->
		<div class="detail-item" id="hostCpuTop5">
			<div class="title">
				<h5 translate="board.hostCpuRateInfoTitle"></h5>
			</div>
			<div id="vcenterHostCpuTop5Chart" class="trendChart" style="height:89%;min-height:249px"></div>
		</div>
	</div>
	<div   class="overviewheight hostmenTop5 col-xs-12 col-sm-6 col-md-6 col-lg-4">
	    <!-- top5主机内存-->
		<div class="detail-item" id="hostMemoryTop5" >
			<div class="title">
				<h5 translate="board.hostMemoryInfoTitle"></h5>
			</div>
			<div id="vcenterHostMemoryTop5Chart" class="trendChart" style="height:89%;min-height:249px"></div>
		</div>
	</div>
	<div class="overviewheight hoststatus col-xs-12 col-sm-6 col-md-6 col-lg-4">
	    <!--主机状态 -->
		<div class="detail-item">
			<div class="title">
				<h5 translate="dashboard.hostStatus"></h5>
			</div>
			<div id="vcenterHostCircle" class="circle"></div>
			<div id="hostInfo" class="numBar" >
				<div class="numItem" id="numItem-normal">
					<label></label><br>
					<span translate="dashboard.opened"></span>
				</div>
				<div class="numItem" id="numItem-close">
					<label></label><br>
					<span translate="dashboard.unKnown"></span>
				</div>
				<div class="numItem" id="numItem-maintain">
					<label></label><br>
					<span translate="dashboard.maintain"></span>
				</div>
			</div>
		</div>
	</div> 
	
	<div class="overviewheight  vmcpu-top5 col-xs-12 col-sm-6 col-md-6 col-lg-4">
		<!-- top5虚拟机CPU-->
		<div class="detail-item" id="vmCpuTop5" >
			<div class="title">
				<h5 translate="board.virtualHostCpuRateInfoTitle"></h5>
			</div>
			<div id="vcenterVmCpuTop5Chart" class="trendChart" style="height:89%;min-height:249px"></div>
		</div>
	</div>
	<div class="overviewheight vmmem-top5 col-xs-12 col-sm-6 col-md-6 col-lg-4">
		 <!-- top5虚拟机内存-->
		<div class="detail-item" id="vmMemoryTop5">
			<div class="title">
				<h5 translate="board.virtualHostMemoryInfoTitle"></h5>
			</div>
			<div id="vcenterVmMemoryTop5Chart" class="trendChart" style="height:89%;min-height:249px"></div>
		</div>
	</div>
</div>
