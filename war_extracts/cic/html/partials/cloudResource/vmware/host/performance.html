<div id="vmPerformance" style="width:100%;height:100%;overflow-y:auto;overflow-x:hidden;padding:10px;" ng-controller="vmwareHostPerformanceController">
	<div class="row performanceRow">
		<!-- CPU利用率-->
		<div class="square-47" style="width:50%;margin-left:0px;">
			<div class="title" style="padding-left:15px;">
				<h5 translate="board.cpuInfo"></h5>
			</div>
			<div line-chart chart-name="CPU" url="{{cpuRateUrl}}" hide-legend=true color-index=4
				 style='width: 100%; height: 240px;' id="clusterCpuRateChart">
				<div class="altStyle" style="padding-left:294px;padding-top:91.5px;" translate="common.noData"></div>
			</div>
		</div>
		<!-- 内存利用率-->
		<div class="square-48"  style="margin-left:10px;">
			<div class="title" style="padding-left:15px;">
				<h5 translate="board.memInfo"></h5>
			</div>
			<div line-chart chart-name="Memory" url="{{memRateUrl}}" hide-legend=true
			     style='width: 100%; height: 240px;' id="clusterMemoryChart">
				<div class="altStyle" style="padding-left:294px;padding-top:91.5px;" translate="common.noData"></div>
			</div>
		</div>
	</div>
	<!-- 第二行 -->
	<div class="row performanceRow">
		<!-- IO吞吐量统计KBps -->
		<div class="square-47" style="width:50%;margin-left:0px;">
			<div class="title" style="padding-left:15px;">
				<h5 translate="vmware.ioPerformance"></h5>
			</div>
			<div line-chart chart-name="Disk" url="{{diskUrl}}" y-axis="value" hide-legend=true color-index=1
				 style='width: 100%; height: 240px;' id="disk">
				<div class="altStyle" style="padding-left:294px;padding-top:91.5px;" translate="common.noData"></div>
			</div>
		</div>
		<!-- 网络吞吐量统计中MBps -->
		<div class="square-48" style="margin-left:10px;">
			<div class="title" style="padding-left:15px;">
				<h5 translate="vmware.netPerformance"></h5>
			</div>
			<div line-chart chart-name="Network" url="{{netUrl}}" y-axis="value" hide-legend=true color-index=2
				 style='width: 100%; height: 240px;' id="net">
				<div class="altStyle" style="padding-left:294px;padding-top:91.5px;" translate="common.noData"></div>
			</div>
		</div>
	</div>
</div>
