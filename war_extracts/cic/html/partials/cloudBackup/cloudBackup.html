<div class="cas-panel" ng-controller="CloudBackUpCtrl">
	<div class="panel-heading cas-panel-heading">
		<ol class="breadcrumb">
			<li><a ui-sref= "main.cloudService"><span translate="cloudService.cloudService"></span></a></li>
			<li class="active"><span translate="cloudBackup.cloudBackup"></span></li>
		</ol>
		<span class="glyphicon glyphicon-question-sign link-help" custom-title="{{'help'|translate}}"
			aria-hidden="true" ng-click="openHelp('cloudBak/viewBak')"></span>
	</div>
	<div class="panel-body">
		<div class="section">
			<div class='lead' >
		      <span class="pic Icon_backup_strategy Icon_common_display">
		      </span>
		      <span class="desc"><span translate="cloudBackup.cloudBackupHead"></span></span>
			</div>
		</div>
		<nav class="navbar-default" role="navigation">
		    <div class="container-fluid">
				<div class="btn-group navbar-right" style='margin-right: -14px;' >
					<label id="refreshCloudDisk" class="btn btn-default btn-menu hidden-xs"   ng-click="refreshCloudBackUp()">
						<span class="sm-icon icon-refresh"></span>
						<span translate="common.refresh"></span>
					</label>
				</div>
	        </div>
        </nav>
		<div class="cas-list-body oneListWithLead-calc">
			<div id="cloudBackupListId" list-style class="table"  ng-grid="gridOptions"></div>
		</div>
	</div>
</div>
