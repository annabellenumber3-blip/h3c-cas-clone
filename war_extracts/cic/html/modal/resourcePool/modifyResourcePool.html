<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
    <button type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('resourcePool/modifyResourcePool')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title"><span translate="resourcePool.modifyResourcePool"></span></h4>
</div>

<div class="modal-body">
	
	<form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
		<!-- 资源池名称 -->
		<div class="form-group">
		   	<label class="control-label"><span translate="resourcePool.name"></span></label>
			<div class="control-input input-group input-xlarge">
			 	<input type="text" ng-maxlength=32 ng-readonly="true" class="form-input form-control" ng-model="model.name" tooltip-placement="right" tooltip="{{model.name}}" ng-trim="false" id="name" name="name">
			</div>
		</div>	
		<!-- 资源池描述 -->
		<div class="form-group" ng-class="{'has-error': (form.description.$dirty && form.description.$invalid)}">
		   	<label class="control-label"><span translate="resourcePool.desc"></span></label>
			<div class="control-input input-group input-xlarge">
			 	<input type="text" ng-maxlength=120 class="form-input form-control" ng-model="model.description"  ng-trim="false" id="description" name="description">
				<span class="input-group-addon help-addon" ng-messages="form.description.$error">
					<span ng-if="form.description.$valid||!form.description.$dirty">
						<span class="icon-occupying"></span>
					</span>
					<span ng-if="form.description.$dirty">
						<span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}120"></span></span>
					</span>
				</span>
			</div>
		</div>
		<!-- 虚拟机备用存储池 -->
		<div class="form-group" ng-if="model.cloudType == 2">
		   	<label class="control-label"><span translate="org.backStorage"></span></label>
			<div class="control-input input-group width260">
				<select-input class="" options="storageOptions" bind-model="tmp.backupDestNum" input-id="storage" input-name="storage"></select-input>
			</div>
		</div>
		<!-- 允许使用本地存储 -->
		<div class="form-group" ng-if="model.cloudType == 2">
			<label class="control-label"><span translate="resourcePool.useLocalStorageConfirm"></span></label>
			<div class="control-input">
				<div class="input-group">
					<div toggle-switch class="switch-success" ng-model="model.useLocalStorageFlag"></div>
					<span class="input-group-addon help-addon">
						<span class="icon-help-gray" custom-title="{{'resourcePool.useLocalStorageTip' | translate}}"></span>
					</span>
				</div>
			</div>
		</div>
	</form>
</div>
<div class="modal-footer">
	<button id="okBtn" class="btn btn-green"  ng-if="model.opType != 'view'"  ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
	<button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
