<!-- 增加云消息弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
     <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <button type="button" class="close cornerhelp" custom-title="{{::'help'|translate}}" ng-click="openHelp('cloudService/cloudMsg/addCloudMsg')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title" translate="cloudService.addCloudMessage"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body">
	<div class="alert alert-info" role="alert" translate="cloudService.addCloudMsgAlert"></div>
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
            <!-- 接收消息用户 -->
            <div class="form-group">   
                <label for="receiveMsgUser" class="control-label"><span translate="cloudService.receiveMsgUser"></span><span style="color:red">&nbsp;</span></label> 
                <div class="control-input">
                    <div id="receiveMsgUserDiv" class="input-group width260" ng-click="selReceiveMsgUser()" >
                        <input id="receiveMsgUser" name="receiveMsgUser" class="selectInput form-control" type="text" ng-model="model.userNames" readonly>
                        <span class="input-group-addon inner-addon last-child-angle">
                            <span class="icon-add-gray" type="button" style="cursor:pointer;" custom-title="{{'cloudService.receiveMsgUser'|translate}}"></span>
                        </span>
                    </div>
                </div>
            </div>
            <!-- 接收消息分组 -->
            <div class="form-group">   
                <label for="receiveMsgGrp" class="control-label"><span translate="cloudService.receiveMsgGrp"></span><span style="color:red">&nbsp;</span></label> 
                <div class="control-input">
                    <div id="receiveMsgGrpDiv" class="input-group width260" ng-click="selReceiveMsgGrp()" >
                        <input id="receiveMsgGrp" name="receiveMsgGrp" class="selectInput form-control" type="text" ng-model="model.userGrpNames" readonly>
                        <span class="input-group-addon inner-addon last-child-angle">
                            <span class="icon-add-gray" type="button" style="cursor:pointer;" custom-title="{{'cloudService.receiveMsgGrp'|translate}}"></span>
                        </span>
                    </div>
                </div>
            </div>
            <!-- 标题 -->
            <div class="form-group" ng-class="{'has-error': (form.title.$dirty && form.title.$invalid)}">
               <label for="title" class="control-label"><span translate="cloudService.title"></span><span style="color: red">*</span></label>
               <div class="control-input" >
                    <div class="input-group input-xlarge">
                        <input type="text" check-special-char ng-maxlength=64 class="form-input form-control" ng-model="model.title"  ng-trim="false" id="title" name="title" required>
                        <span class="input-group-addon help-addon" ng-messages="form.title.$error">
                            <span ng-if="form.title.$valid||!form.title.$dirty">
                                <span class="icon-occupying"></span>
                            </span>
                            <span ng-if="form.title.$dirty">
                                <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
                                <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}64"></span></span>
                                <span ng-message="specialChar"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'checkname2'|translate}}"></span></span>
                            </span>
                        </span>
                    </div>
                </div>   
            </div> 
            <!-- 消息级别 -->
            		<div class="form-group">
                        <label for="msgLevelSelect" class="control-label"><span translate="cloudService.messageLevel"></span><span style="color:red">&nbsp;</span></label>
                        <div class="control-input">
                            <div class="input-group width260" >
                                <select-input class="" options="messageLevel.options"  bind-model="model.msgLevel" input-id="messageLevel" input-name="messageLevel">
                                </select-input>
                            </div>
                        </div>
                    </div> 
            <!-- 内容 -->
            <div class="form-group" ng-class="{'has-error': (form.msgContent.$dirty && form.msgContent.$invalid)}">
               <label for="msgContent" class="control-label"><span translate="cloudService.content"></span><span style="color: red">*</span></label>
               <div class="control-input" >
                    <div class="input-group input-xlarge">
                        <textarea ng-maxlength=512 class="form-input form-control" ng-model="model.content"  ng-trim="false" id="msgContent" name="msgContent" required></textarea>
                        <span class="input-group-addon help-addon" ng-messages="form.msgContent.$error">
                            <span ng-if="form.msgContent.$valid||!form.msgContent.$dirty">
                                <span class="icon-occupying"></span>
                            </span>
                            <span ng-if="form.msgContent.$dirty">
                                <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
                                <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}512"></span></span>
                            </span>
                        </span>
                    </div>
                </div>   
            </div> 
        </form>
    </div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <button id="okBtn" class="btn btn-green" ng-disabled="form.$invalid||!(model.userNames||model.userGrpNames)" ng-click="send()" translate="cloudService.send"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
