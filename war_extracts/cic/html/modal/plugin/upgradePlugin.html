<div class="modal-header">
	<button type="button" class="close"
		custom-title="{{::'common.close'|translate}}" ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	<button type="button" class="close cornerhelp"
		custom-title="{{::'help'|translate}}" ng-click="openHelp()">
		<span class="icon-helpnew"></span>
	</button>
	<h4 class="modal-title" translate="pluginMgr.upgradePlugin"></h4>
</div>
<div class="modal-body row">
	<div class="form-horizontal col-md-8">
			<form name="form" class="form-horizontal list-body" role="form" novalidate>
                    <!-- 隐藏属性，用于js方法操作form是否显示 -->
                    <input type="hidden" id="form" value="{{form.$valid}}">
                    <div translate="pluginMgr.uploadPlugin" style="padding: 10px;background-color: #D9EDF7;border-radius: 5px;"></div>
	        		<div id="i_select_files" style="height:200px;"></div>
					<div id="i_stream_files_queue" style="height:200px;"></div>
					<br>
					<div id="streambtn" style='margin-top: -14px;margin-left:170px;'>
						<button class=" btn btn-green" ng-click="upload()" translate="uploadfile.uploadisoUploadBtnTips"></button>
						<button class=" btn btn-black" ng-click="stream.stop();" translate="uploadfile.uploadisoStopBtnTips"></button>
						<button class=" btn btn-black" ng-click="stream.cancel();" translate="uploadfile.uploadisoCancelBtnTips"></button>
					</div>
                </form>
	</div>
	<div class="detail-table col-md-4">
        <h5 translate="uploadfile.uploadisoStatusTips" style="padding-left:10px;"></h5>
        <div id="i_stream_message_container" class="stream-main-message-box" style="overflow: auto; height: calc(100% - 35px);"></div>
    </div>
</div>
<div class="modal-footer">
	<button id="upgradePluginBtn" class="btn btn-green" ng-disabled="!hasUpload" ng-click="ok()" translate="common.confirm"></button>
	<button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
