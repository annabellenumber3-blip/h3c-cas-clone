<!-- 组织资源配额高级查询弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="common.advancedQuery"></h4>
</div>
<!-- 内容 -->
<div class="modal-body">
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
            <!-- 组织 -->
            <div class="form-group" ng-class="{'has-error': (form.organization.$invalid)}">
            	<label for="organization" class="control-label"><span translate="common.organization"></span><span style="color: red">&nbsp;</span></label>
                <div class="input-group" style="width:299px">
                    <div class="input-group width260" >
                        <input id="organization" ng-readonly="true" name="organization"  class="form-control first-child-angle selectInput" type="text" ng-model="org.name" ng-click="selectOrg()">
                        <span class="input-group-addon inner-addon" ng-click="selectOrg()">
                            <span class="icon-search-gray" type="button"></span>
                        </span> 
                    </div>
                </div>
            </div>

             <!-- 用户 -->
            <div class="form-group" ng-class="{'has-error': (form.user.$invalid)}">
            	<label for="user" class="control-label"><span translate="common.user"></span><span style="color: red">&nbsp;</span></label>
                <div class="input-group" style="width:299px">
                    <div class="input-group width260" >
                        <input id="user" ng-readonly="true" name="user"  class="form-control first-child-angle selectInput" type="text" ng-model="user.name" ng-click="selectUser()">
                        <span class="input-group-addon inner-addon" ng-click="selectUser()">
                            <span class="icon-search-gray" type="button"></span>
                        </span> 
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
	<button id="resetId" class="btn btn-green" ng-click="reset()" translate="common.reset"></button>
    <button id="okId" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
