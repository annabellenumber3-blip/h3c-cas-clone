<!-- 弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()">
        <span aria-hidden="true">&times;</span><span class="sr-only">Close</span>
    </button>
    <h4 class="modal-title" translate="common.addDir"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body">
    <div class="form-horizontal">
        <form name="addFolderForm" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
            <div class="form-group" ng-class="{'has-error': (addFolderForm.addFolderName.$dirty && addFolderForm.addFolderName.$invalid)}">
                <label for="addFolderName_id" class="control-label"><span translate="common.dirName"></span><span style="color: red">*</span></label>
                <div class="control-input">
                    <div class="input-group input-xlarge width260">
                        <input check-directory-name type="text" ng-maxlength=120 class="form-control  selectInput width260 first-child-angle" ng-model="addFolderName" ng-trim="false" id="addFolderName_id" name="addFolderName" required>
                        <span class="input-group-addon help-addon" ng-messages="addFolderForm.addFolderName.$error">
                            <span ng-if="addFolderForm.addFolderName.$dirty">
                                <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
                                <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}120"></span></span>
                                <span ng-message="checkDirectoryName"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'checkDirectoryName'|translate}}"></span></span>
                            </span>
                        </span>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <button id="addCvmFolderOk" class="btn btn-green" ng-disabled="addFolderForm.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button id="addCvmFolderCancel" class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
