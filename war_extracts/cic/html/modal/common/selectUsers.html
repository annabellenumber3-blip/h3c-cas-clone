<!-- 选择操作员列表窗口（通用对话框） -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
	<h4 class="modal-title" translate="common.selectUser"></h4>
</div>
<div class="modal-body list-body">
   <div style="width: 100%; height: 200px;" class="table"  ng-grid="gridOptions"></div>
	   		
	<nav class="navbar-default" role="navigation">
		<div class="container-fluid">
			<div class="btn-group navbar-left" >
				<label class="btn btn-default btn-menu hidden-xs" ng-click="addUser()" >
					<span class="sm-icon icon-add"></span>
					<span translate="org.addTo"></span>
			    </label>
				<label class="btn btn-default btn-menu hidden-xs" ng-click="removeUser()">
					<span class="sm-icon icon-close"></span>
					<span translate="org.remove"></span>
				</label>
			</div>
		</div>
	</nav>

   <div style="width: 100%; height: 200px; margin-top:10px;" class="table"  ng-grid="userOptions"></div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
    <button id="okBtn" class="btn btn-green"  ng-click="ok()" ng-disabled="userData.length<1" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
