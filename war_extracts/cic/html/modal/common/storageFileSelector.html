<!-- 选择存储文件弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
     <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="common.selectStorage"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body row" ng-controller="SelectStorageListInHostCtrl" >
    <!-- 存储池列表 -->
    <div class="panel-body col-md-4" style="padding:0px 10px 0px 0px;">
        <div id="storagePoolListSelectorDivId" style="width: 100%; height: 360px;" class="table"  ng-grid="gridOptions"></div>
    </div>
    <!-- 存储列表（分页） -->
    <div class="panel-body col-md-8" style="padding:0px;">
        <div id="storageListSelectorDivId" style="width: 100%; height: 360px;" class="table"  ng-grid="gridOptions2"></div>
    </div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <!-- 增加存储池 -->
   <!--  <button has-permission="HOST_STORAGE_MGR" id="addStoragePoolBtn" class="btn btn-green"  ng-click="addStoragePool()" translate="storagePool.addStoragePool"></button> -->
    
    <!-- 上传文件 -->
    <!-- <button id="uploadFileBtn" class="btn btn-green" has-permission="HOST_STORAGE_MGR"
    ng-disabled="mySelections.length != 1 || mySelections[0].path == '/dev/disk/by-id' || mySelections[0].status != 1 || paramsObj.mode==1"
    ng-click="uploadFile()" translate="host.uploadFile"></button> -->
    
    <!-- 增加存储卷 -->
    <button id="addStorageBtn" class="btn btn-green" has-permission="HOST_STORAGE_MGR"
    ng-disabled="mySelections.length != 1 || mySelections[0].path == '/dev/disk/by-id' || mySelections[0].status != 1 || paramsObj.mode==1" 
    ng-click="addStorage()" translate="host.createStoragevol"></button>
    
    <button id="okBtn" class="btn btn-green" ng-disabled="mySelections2.length != 1" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
