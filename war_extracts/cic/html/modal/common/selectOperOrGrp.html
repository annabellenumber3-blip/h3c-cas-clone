<!-- 多选择列表窗口（通用对话框） -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
	<h4 class="modal-title" >{{title}}</h4>
</div>
<div class="form-group">
	<label class="control-label" style="margin-left:5px"><span>{{workflowType}}</span></label>
	<label class="control-label">
		<cas-ace-check id="operator" name="operatorOrGroup" type="radio" text="{{::'entrust.selOperator' | translate}}" 
			          checked-value="1" checked="{{operatorOrGroup == 1}}" ng-model="operatorOrGroup"  ></cas-ace-check>
     </label>
     <label class="control-label">
		    <cas-ace-check id="group" name="operatorOrGroup" type="radio" text="{{::'entrust.selGroup' | translate}}" 
		   checked-value="0" checked="{{operatorOrGroup == 0}}"  ng-model="operatorOrGroup" ></cas-ace-check>
     </label>
</div>
	<div class="modal-body list-body" style="padding-top:0px;top:-5px">
	   <div style="width: 100%; height: 300px; margin-top:10px" class="table"  ng-grid="gridOptions"  ng-if="operatorOrGroup == '1'"></div>
	   <div style="width: 100%; height: 300px; margin-top:10px" class="table"  ng-grid="gridOptions2" ng-if="operatorOrGroup == '0'"></div>
	</div>
<!-- </slide-form> -->
<!-- </slide-form> -->
<!-- 按钮栏 -->
<div class="modal-footer">
    <button id="okBtn" class="btn btn-green" ng-click="ok()" ng-disabled="mySelections.length<1 && mySelections2.length<1" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
