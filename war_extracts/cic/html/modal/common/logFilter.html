<!-- 过滤操作日志弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="common.filter"></h4>
</div>
<!-- 内容 -->
<div class="modal-body">
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
            <!-- 登录名 -->
            <div class="form-group" " ng-class="{'has-error': (form.loginName.$dirty && form.loginName.$invalid)}">
               <label for="loginName" class="control-label"><span translate="common.loginName"></span><span style="color: red">&nbsp;</span></label>
               <div class="control-input" >
                    <div class="input-group input-xlarge">
                        <input type="text" ng-maxlength=32 class="form-input form-control" ng-model="filter.loginName"  ng-trim="false" id="loginName" name="loginName">
                        <span class="input-group-addon help-addon" ng-messages="form.loginName.$error">
                            <span ng-if="form.loginName.$valid||!form.loginName.$dirty">
                                <span class="icon-occupying"></span>
                            </span>
                            <span ng-if="form.loginName.$dirty">
                                <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}32"></span></span>
<!--                                 <span ng-message="checkname"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'checkname'|translate}}"></span></span> -->
                            </span>
                        </span>
                    </div>
                </div>   
            </div>
            <!-- 操作员姓名 -->
            <div class="form-group">
               <label for="operatorName" class="control-label"><span translate="common.operatorName"></span><span style="color: red">&nbsp;</span></label>
               <div class="control-input" >
                    <div class="input-group input-xlarge">
                        <input type="text"  class="form-input form-control" ng-model="filter.userName"  ng-trim="false" id="operatorName" name="operatorName">
                        <span class="input-group-addon help-addon" ng-messages="form.operatorName.$error">
                            <span ng-if="form.operatorName.$valid||!form.operatorName.$dirty">
                                <span class="icon-occupying"></span>
                            </span>
                        </span>
                    </div>
                </div>   
            </div>
            <!-- 完成时间（从） -->
            <div class="form-group">
                <label for="clearLog" class="control-label">
                    <span translate="common.finishTimeStart"></span><span style="color: red">&nbsp;</span>
                </label>
                <div class="control-input">
                    <div class="input-group date input-large"  date-cell="#finishTimeStartInput" jes-date format="YYYY-MM-DD" picker-position="right" max-date="startMaxDate" ng-model="filter.operTime_from">
                        <input id="finishTimeStartInput" class="form-input form-control selectInput first-child-angle calendar-input-img" type="text" readonly>
                    </div>
                </div>
            </div>
            <!-- 完成时间（至） -->
            <div class="form-group">
                <label for="clearLog" class="control-label">
                    <span translate="common.finishTimeEnd"></span><span style="color: red">&nbsp;</span>
                </label>
                <div class="control-input">
                    <div class="input-group date input-large"  date-cell="#finishTimeEndInput" jes-date format="YYYY-MM-DD" picker-position="right" min-date="endMinDate" max-date="endMaxDate" ng-model="filter.operTime_to">
                        <input id="finishTimeEndInput" class="form-input form-control selectInput first-child-angle calendar-input-img" type="text" readonly>
                    </div>
                </div>
            </div>
            <!-- 登录地址 -->
            <div class="form-group" ng-class="{'has-error': (form.loginIp.$dirty && form.loginIp.$invalid)}">
                <label for="loginIp" class="control-label"><span translate="common.address"></span><span style="color:red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group input-xlarge">
                        <input type="text" ip ng-maxlength=130 class="form-input form-control" ng-model="filter.address"  ng-trim="false" id="inputip_bmc" name="loginIp">
                        <span class="input-group-addon help-addon" ng-messages="form.loginIp.$error">
                            <span ng-if="form.loginIp.$valid||!form.loginIp.$dirty">
                                 <span class="icon-occupying"></span>
                            </span>
                            <span ng-if="form.loginIp.$dirty">
                                 <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}130"></span></span>
                                 <span ng-message="ip"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidip'|translate}}"></span></span>
                            </span>
                        </span>
                    </div>
                </div>
            </div>
            <!-- 操作分类 -->
            <div class="form-group" ng-if="showCategory==true">
                <label for="categorySelect" class="control-label"><span translate="common.category"></span><span style="color:red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <select-input class="" options="category.options" bind-model="filter.category" input-id="category" input-name="category">
                        </select-input>
                    </div>
                </div>
            </div>
            <!-- 操作描述 -->
            <div class="form-group" " ng-class="{'has-error': (form.operDesc.$dirty && form.operDesc.$invalid)}">
               <label for="loginName" class="control-label"><span translate="common.operDesc"></span><span style="color: red">&nbsp;</span></label>
               <div class="control-input" >
                    <div class="input-group input-xlarge">
                        <input type="text" ng-maxlength=32 class="form-input form-control" ng-model="filter.description" ng-trim="false" id="operDesc" name="operDesc">
                        <span class="input-group-addon help-addon" ng-messages="form.operDesc.$error">
                            <span ng-if="form.operDesc.$valid||!form.operDesc.$dirty">
                                <span class="icon-occupying"></span>
                            </span>
                            <span ng-if="form.operDesc.$dirty">
                                <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}32"></span></span>
                            </span>
                        </span>
                    </div>
                </div>   
            </div>
            <!-- 执行结果 -->
            <div class="form-group">
                <label for="categorySelect" class="control-label"><span translate="common.result"></span><span style="color:red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <select-input class="" options="result.options" bind-model="filter.result" input-id="result" input-name="result">
                        </select-input>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
	<button id="resetId" class="btn btn-green" ng-click="reset()" translate="common.reset"></button>
    <button id="okId" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
