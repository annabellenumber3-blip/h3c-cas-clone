<!-- 清除操作日志弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <button type="button" class="close cornerhelp" custom-title="{{::'help'|translate}}" ng-click="openHelp('sysMgmt/log/cleanLog')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title" translate="common.clearLog"></h4>
</div>
<!-- 内容 -->
<div class="modal-body">
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
	        <label for="clearLog" class="control-label">
                <span translate="common.clearDate"></span><span style="color: red">*</span>
            </label>
            <div class="form-group" ng-class="{'has-error': (form.dtp_input1.$dirty && form.dtp_input1.$invalid)}">
                <div class="control-input">
                    <div class="input-group date input-large"  date-cell="#clearDate0" jes-date format="YYYY-MM-DD" max-date="maxvalue" ng-model="clearDate" is-today="false">
                        <input id="clearDate0" name="clearDate0" class="form-input form-control selectInput first-child-angle calendar-input-img" type="text" readonly>
                    </div>
                    <input id="clearDate1" type="hidden" id="dtp_input1" vlaue="" ng-model="clearDate" required/>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
    <button id="okBtn" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
