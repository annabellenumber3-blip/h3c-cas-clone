<!-- 操作员分组选择弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="operator.selectOperatorGroup"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body list-body">
	<!-- <div ng-controller="OperatorGrpListCtrl">
         <div style="width: 100%; height: 360px;" class="table"  ng-grid="gridOptions"></div>
	</div> -->
	<div class="panel-body" ng-controller="OperatorGrpTreeListCtrl">
	    <tree-grid tree-data="treeData"
	    		   col-defs="column"
	    		   expand-on="expandColum"
	    		   icon-leaf="-"
	    		   icon-expand=""
	    		   icon-collapse=""
	    		   on-select="setSelectData(branch)"
	    		   on-click=""
	    		   template-url=""
	    		   expand-level="9"
	    		   tree-grid-heigth="460px"
	    		   header-color="#e4eaec"
	    		   row-height="32">
	    </tree-grid>
	 </div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <!-- 增加操作员 -->
    <button has-permission="OPERATOR_GROUP_ADD" ng-if="showAddOperatorGroup==true" id="addGroupBtn"  class="btn btn-green" ng-click="addOperatorGroup()" translate="common.add"></button>
    <button id="addGroupOkBtn" class="btn btn-green" ng-disabled="!seleteData.id" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
