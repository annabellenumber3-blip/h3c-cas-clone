<!-- CVM本地目录选择弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="common.selectCVMFolder"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body list-body">
    <div id="cicFolderTree" cic-folder-tree url="cicBackup/cicFolder" select-node="selectFolder" style="height:360px;overflow:auto"></div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
	<button id="addCVMFolder" class="btn btn-green" ng-disabled="selectFolder==null" ng-click="addFolder()" translate="common.add"></button>
    <button id="selectCVMFolder" class="btn btn-green" ng-disabled="selectFolder==null" ng-click="ok()" translate="common.confirm"></button>
    <button id="ceancelCVMFolder" class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
