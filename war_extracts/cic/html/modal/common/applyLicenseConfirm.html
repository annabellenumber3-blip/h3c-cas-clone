<!-- 标题 -->
<div class="modal-header">
	<button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	<h4 class="modal-title" translate="operConfirm"></h4>
</div>
<div class="modal-body">
	<div class="form-horizontal">
		<form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
		    <div class="form-group" >
               <label class="control-label" style="width: 260px;color:red;"><span translate="common.applyLicenseServerPrompt"></span></label>
		    </div>
		    <div class="form-group" ng-class="{'has-error': (form.userInput.$dirty && form.userInput.$invalid)}">
               <div class="control-input">
				     <div class="input-group width260">
						   <input type="text" class="form-input form-control" ng-model="tmp.userInput" id="userInput" name="userInput" required>
						   <span class="input-group-addon help-addon" ng-messages="form.userInput.$error" ng-if="form.userInput.$dirty">
							 <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
							 <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}130"></span></span>
						   </span>
					  </div>
			   </div>
		    </div>
		</form>
	</div>
</div>
	
 <div class="modal-footer">
	  <button id="deleteConfirmBtn" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
	  <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
 </div>
