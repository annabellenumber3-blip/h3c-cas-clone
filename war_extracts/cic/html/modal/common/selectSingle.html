<!-- 选择操作员列表窗口（通用对话框） -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
	<h4 class="modal-title" >{{title}}</h4>
</div>
<div class="modal-body list-body">
   <div id="singleGrid" style="width: 100%; height: 300px;" class="table"  ng-grid="gridOptions"></div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
    <!-- 取消"增加CVM"和"增加vCenter资源"，添加"增加云资源" -->
    <button ng-if="showAddCloudResource == true" has-permission="CVM_MNG_ADD" id="addCloudResourceBtn"  class="btn btn-green" ng-click="addCloudResource()" translate="cloudResource.addCloundResource"></button>
    <!--  
        <button ng-if="showAddBtn == true" id="addBtn"  class="btn btn-green" ng-click="add()" translate="common.add"></button>
    <button ng-if="showAddCvmBtn == true" has-permission="CVM_MNG_ADD" id="addCvmBtn"  class="btn btn-green" ng-click="addCvm()" translate="cloudResource.addCvm"></button>
    <button ng-if="showAddVcenterBtn == true" has-permission="CVM_MNG_ADD" id="addVcenterBtn"  class="btn btn-green" ng-click="addVcenter()" translate="cloudResource.addVcenter"></button>
    -->
    <button ng-if="showAddOrgResourcePool == true" has-permission="RESOURCEPOOL_ADD" id="addResourcePoolBtn"  class="btn btn-green" ng-click="addResourcePool()" translate="resourcePool.addResourcePool"></button>
    <button ng-if="showAddNoticeTemplate == true" has-permission="ALARM_NOTICETEMPLATE_ADD" id="addAlarmNoticeTemplateBtn"  class="btn btn-green" ng-click="addNoticeTemplate()" translate="alarm.addNoticeTemplate"></button>
    <button ng-if="showAddOrgBtn == true" has-permission="ORGANIZATION_ADD" id="addOrgBtn"  class="btn btn-green" ng-click="addOrg()" translate="org.add"></button>
    <button id="okBtn" class="btn btn-green"  ng-click="ok()" ng-disabled="mySelections.length<1" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
