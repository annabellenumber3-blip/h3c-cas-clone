<div class="modal-header">
<!-- 选择防病毒软件 -->
	<button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	<h4 class="modal-title" translate="cloudService.selectAntivirus"></h4>
</div>
<div class="modal-body list-body">
    <div style="width: 100%; height: 300px;" class="table"  ng-grid="gridOptions"></div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
    <button id="okBtnId" class="btn btn-green"  ng-click="ok()" ng-disabled="seleteAcl.length<1" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
