<!-- 界面定制弹出窗口 -->
<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <!-- <button type="button" class="close cornerhelp" ng-controller="HostpoolCtrl" custom-title="{{'help'|translate}}" ng-click="openHelp('logFilter')">
		<span class="glyphicon glyphicon-question-sign"	style="font-size: 16px;" aria-hidden="true"></span>
	</button> -->
    <h4 class="modal-title" translate="common.uicustom"></h4>
</div>
<!-- 内容 -->
<div class="modal-body modal-body-padding">
<!-- 	<div class="alert alert-info alert-margin" role="alert" translate="uicustomVm.uicustomTip"></div> -->
	<div class="form-horizontal">
   	<form name="form" id="form" style="margin:0;" novalidate>
      <div>
      	 <div class="uicustom-background">
      	 	<div class="vmgrid-title" translate="uicustomVm.columName"></div>
      	 	<div class="vmgrid-width" translate="uicustomVm.columWidth"></div>
      	 	<div class="vmgrid-display" translate="uicustomVm.columDisplay"></div>
      	 </div>
         <div class="dd" id="nestable" style="max-width:100%;">
			 <ol class="dd-list" >
				 <li ng-repeat="item in domainAttrs" class="dd-item item-green vmgrid-dditem" data-id="{{item.index}}"  ng-model="item.order">
					 <div  class="dd-handle vmgrid-ddhandle">
						 <div class="vmgrid-coltitle">{{item.attrName}}</div>
						 <div class="vmgrid-colwidth" ><input type="text" style="width:130px;height: 26px;padding: 0 0 0 5px;" embed-grid="true" checkint spinner spinner-min=50 spinner-max=9999 ng-model="item.widthVal" required></div>
						 <div class="vmgrid-coldisplay"><div toggle-switch  class="switch-small switch-success" ng-model="item.showFlag"></div></div>
					 </div>
				 </li>
			 </ol>
		  </div>
      </div>
    </form>
    </div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
    <button id="okBtn" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
