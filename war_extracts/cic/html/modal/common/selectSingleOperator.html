<!-- 选择操作员列表窗口（通用对话框） -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
	<h4 class="modal-title" translate="common.selectOperator"></h4>
</div>
<div class="modal-body list-body">
   <div style="width: 100%; height: 300px;" class="table"  ng-grid="gridOptions"></div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
    <button id="okBtn" class="btn btn-green"  ng-click="ok()" ng-disabled="mySelections.length<1" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
