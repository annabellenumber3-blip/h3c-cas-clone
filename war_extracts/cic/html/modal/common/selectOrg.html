<!-- 选择组织列表窗口（通用对话框） -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
    <button ng-if="entryType" type="button" class="close cornerhelp" custom-title="{{::'help'|translate}}" ng-click="openHelp()">
		<span class="icon-helpnew"></span>
	</button>
	<h4 class="modal-title">{{pageTitle}}</h4>
</div>
<div class="modal-body list-body">
   <div style="width: 100%; height: 300px;" class="table"  ng-grid="gridOptions"></div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
    <button id="addBtnOrg"  class="btn btn-green" has-permission="ORGANIZATION_ADD" ng-click="addOrg()" translate="common.add"></button>
    
    <button id="okBtn" class="btn btn-green" ng-if = "!multiSelect" ng-click="ok()" ng-disabled="mySelections.length!=1" translate="common.confirm"></button>
    <button id="okBtn" class="btn btn-green" ng-if = "multiSelect" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
