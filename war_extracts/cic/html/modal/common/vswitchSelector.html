<!-- 虚拟交换机选择弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="common.selectVswitch"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body list-body">
	<div  ng-controller="VswitchListInHostCtrl">
         <div style="width: 100%; height: 360px;" class="table"  ng-grid="gridOptions"></div>
	</div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <!-- 增加虚拟机交换机 -->
    <!-- <button id="addBtn" class="btn btn-green" ng-click="addVswitch()" translate="common.add"></button> -->
    <button id="okBtn" class="btn btn-green" ng-disabled="mySelections.length != 1" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
