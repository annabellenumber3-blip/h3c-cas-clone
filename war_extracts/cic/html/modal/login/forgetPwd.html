<div class="modal-header">
	 <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	<h4 class="modal-title" translate=getpwd></h4>
</div>
<div class="modal-body">
<!-- 	<div class="alert alert-info" role="alert" translate="forgetPwdTip"></div> -->
	<div class="form-horizontal">
		<form name="form" class="form-horizontal" role="form" novalidate>
			<input type="hidden" id="form" value="{{form.$valid}}">
			<div class="form-group" " ng-class="{'has-error': (form.loginName.$dirty && form.loginName.$invalid)}">
			            <label for="loginName" class="control-label"><span translate="common.loginName"></span><span style="color: red">*</span></label>
			            <div class="control-input" >
			                 <div class="input-group input-xlarge">
			                     <input id="addOperator_1" type="text"  checkname ng-maxlength=32 class="form-input form-control" ng-model="entry.loginName"  ng-trim="false" id="loginName" name="loginName" required>
			                     <span class="input-group-addon help-addon" ng-messages="form.loginName.$error">
			                         <span ng-if="form.loginName.$dirty">
			                             <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
			                             <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}32"></span></span>
			                             <span ng-message="checkname"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'checkname'|translate}}"></span></span>
			                         </span>
			                     </span>
			                 </div>
			             </div>   
			 </div>
			  <div class="form-group" ng-class="{'has-error': (form.email.$dirty && form.email.$invalid)}">
			            <label for="email" class="control-label"><span>E-mail</span><span style="color: red">*</span></label>
			            <div class="control-input">
			                <div class="input-group input-xlarge">
			                    <input id="addOperator_7" checkemail  type="email" required ng-maxlength=130 class="form-input form-control" ng-model="entry.email"  ng-trim="false" name="email">
			                    <span class="input-group-addon help-addon"  ng-if="form.email.$dirty" ng-messages="form.email.$error">
		                             <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
		                             <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}130"></span></span>
		                             <span ng-message="checkemail"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidemail'|translate}}"></span></span>
			                    </span>
			                </div>
			            </div>
			  </div>
		</form>

	</div>
</div>

 <div class="modal-footer">
	  <button class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
	  <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
 </div>
