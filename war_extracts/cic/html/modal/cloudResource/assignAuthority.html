<!-- 资源授权管理弹出窗口 -->
<div class="modal-header">
	 <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	<button type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('cloudResource/authorizeCVMRes')">
		<span class="icon-helpnew"></span>
	</button>
	<h4 class="modal-title" translate="assignAuthority.name"></h4>
</div>
<div class="modal-body">
	<div class="form-horizontal">
		<form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
            <!-- 原操作员分组 -->
			<div class="form-group">
				<label for="oldOperator" class="control-label short"><span translate="assignAuthority.oldOperatorGrp"></span></label>
				<div class="control-input">
				     <div class="input-group width260">
						   <input type="text" class="form-input form-control" ng-model="hp.srcGroup" id="oldOperator" name="oldOperator" disabled>
					  </div>
			   </div>
		  </div>
            <!-- 授权管理员分组 -->
			<div class="form-group" >
               <label for="inputassign_adminGrp" class="control-label short"><span translate="assignAuthority.assignAdminGrp"></span><span style="color: red">*</span></label>
               <div class="control-input">
					   <div id="selOperatorGroupDiv" class="input-group width260" ng-click="selOperatorGroup()">
						   <input type="text" class="form-control first-child-angle selectInput" ng-model="hp.newGroup"  ng-trim="false" id="adminGroup" name="adminGroup" required readonly>
					  	   <span class="input-group-addon inner-addon">
	                              <span class="icon-search-gray" type="button" style="cursor:pointer;"></span>
	                        </span>	
					   </div>
				</div>   
		  </div>
		</form>

	</div>
</div>

 <div class="modal-footer">
	  <button id="assignAuthorityBtn" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
	  <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
 </div>
