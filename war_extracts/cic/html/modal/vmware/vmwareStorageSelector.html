<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
        <span class="icon-closenew"></span>
    </button>
    <h4 ng-if="type==undefined" class="modal-title" translate="common.selectTemplateStorage"></h4>
    <h4 ng-if="type=='selectStoragepool'" class="modal-title" translate="vm.storagepoolModal.selectStoragepool"></h4>
</div>
<form name="form" class="form-horizontal" role="form" style="height:280px;overflow:auto;padding-left:10px;margin-bottom: 0px;" novalidate>
	<div style="margin-top:10px">
		<div vmware-storage-pool url="{{queryStorageUrl}}" id="vmwareTemplateStorage" select-pool="selectPool"></div>
	</div>
</form>
<div class="modal-footer">
    <button id="okBtn" class="btn btn-green" ng-disabled="selectPool.targetPath == undefined" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
