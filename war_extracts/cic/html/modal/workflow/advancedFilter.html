<!-- 高级过滤弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="workflow.advancedFilter"></h4>
</div>
<!-- 内容 -->
<div class="modal-body" style="padding-right:10px;">
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
            <!-- 用户名 -->
            <div class="form-group" " ng-class="{'has-error': (form.userName.$dirty && form.userName.$invalid)}">
               <label for="userName" class="control-label"><span translate="username"></span><span style="color: red">&nbsp;</span></label>
               <div class="control-input" >
                    <div class="input-group input-xlarge">
                        <input type="text" checkUserLoginname ng-maxlength=32 class="form-input form-control" ng-model="filter.userName"  ng-trim="false" id="userName" name="userName">
                        <span class="input-group-addon help-addon" ng-messages="form.userName.$error">
                            <span ng-if="form.userName.$valid||!form.userName.$dirty">
                                <span class="icon-occupying"></span>
                            </span>
                            <span ng-if="form.userName.$dirty">
                                <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}32"></span></span>
                                <span ng-message="checkname"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'checkname'|translate}}"></span></span>
                            </span>
                        </span>
                    </div>
                </div>   
            </div>
            <!-- 模板名 -->
            <div class="form-group" ng-class="{'has-error': (form.templateName.$dirty && form.templateName.$invalid)}">
               <label for="templateName" class="control-label"><span translate="vm.templateName"></span><span style="color: red">&nbsp;</span></label>
               <div class="control-input" >
                    <div class="input-group input-xlarge">
                        <input type="text"  ng-maxlength=32 class="form-input form-control" ng-model="filter.templateName"  ng-trim="false" id="templateName" name="templateName">
                        <span class="input-group-addon help-addon" ng-messages="form.templateName.$error">
                            <span ng-if="form.templateName.$valid||!form.templateName.$dirty">
                                <span class="icon-occupying"></span>
                            </span>
                            <span ng-if="form.templateName.$dirty">
                                <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}32"></span></span>
                            </span>
                        </span>
                    </div>
                </div>   
            </div>
            <!-- 状态 -->
            <div class="form-group">
                <label class="control-label"><span translate="workflow.status"></span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <select-input class="" options="statusOptions" bind-model="filter.status" input-id="status" input-name="status">
                        </select-input>
                    </div>
                </div>
            </div>
            <!-- 类型 -->
            <div class="form-group">
                <label class="control-label"><span translate="workflow.type"></span><span style="color:red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <select-input class="" options="typeOptions" bind-model="filter.type" input-id="type" input-name="type">
                        </select-input>
                    </div>
                </div>
            </div>
            <!-- 创建时间（从） -->
            <div class="form-group">
                <label class="control-label">
                    <span translate="common.createTimeStart"></span><span style="color: red">&nbsp;</span>
                </label>
                <div class="control-input">
                    <div class="input-group date input-large"  date-cell="#createTimeStartInput" jes-date format="YYYY-MM-DD" picker-position="right" max-date="createStartMaxDate" ng-model="filter.createTime_start">
                        <input id="createTimeStartInput" class="form-input form-control selectInput first-child-angle calendar-input-img" type="text" readonly>
                    </div>
                </div>
            </div>
            <!-- 创建时间（至） -->
            <div class="form-group">
                <label class="control-label">
                    <span translate="common.createTimeEnd"></span><span style="color: red">&nbsp;</span>
                </label>
                <div class="control-input">                    
                    <div class="input-group date input-large"  date-cell="#createTimeEndInput" jes-date format="YYYY-MM-DD" picker-position="right" min-date="createEndMinDate" ng-model="filter.createTime_end">
                        <input id="createTimeEndInput" class="form-input form-control selectInput first-child-angle calendar-input-img" type="text" readonly>
                    </div>
                </div>
            </div>
            <!-- 处理时间（从） -->
            <div class="form-group">
                <label class="control-label">
                    <span translate="common.handleTimeStart"></span><span style="color: red">&nbsp;</span>
                </label>
                <div class="control-input">                    
                    <div class="input-group date input-large"  date-cell="#handleTimeStartInput" jes-date format="YYYY-MM-DD" picker-position="right" max-date="handleStartMaxDate" ng-model="filter.handleTime_start">
                        <input id="handleTimeStartInput" class="form-input form-control selectInput first-child-angle calendar-input-img" type="text" readonly>
                    </div>
                </div>
            </div>
            <!-- 处理时间（至） -->
            <div class="form-group">
                <label class="control-label">
                    <span translate="common.handleTimeEnd"></span><span style="color: red">&nbsp;</span>
                </label>
                <div class="control-input">                    
                    <div class="input-group date input-large"  date-cell="#handleTimeEndInput" jes-date format="YYYY-MM-DD" picker-position="right" min-date="handleEndMinDate" ng-model="filter.handleTime_end">
                        <input id="handleTimeEndInput" class="form-input form-control selectInput first-child-angle calendar-input-img" type="text" readonly>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
	<button id="resetId" class="btn btn-green" ng-click="reset()" translate="common.reset"></button>
    <button id="okId" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
