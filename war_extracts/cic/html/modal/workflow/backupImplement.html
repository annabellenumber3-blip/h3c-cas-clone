<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
    <button type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" 
    	ng-click="openHelp('cloudService/cloudBsStrategy/handlerCloudBsStrategyWorkflow')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title"><span translate="workflow.backupImplement"></span></h4>
</div>
<!-- 内容 -->
<div class="modal-body row">
	<form name="form"  class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate >
		<div class="form-group">
		    <label class="control-label"><span translate="workflow.backupStName"></span></label>
		    <div class="control-input">
		      <p class="form-control-static" custom-title shortcut short-width=300 cut-str="{{model.name}}">{{model.name}}</p>
		    </div>
		</div>
		<div class="form-group">
		    <label class="control-label"><span translate="workflow.timePeriod"></span></label>
		    <div class="control-input">
		      <p class="form-control-static" custom-title shortcut short-width=300 cut-str="{{model.timePeriod}}">{{model.timePeriod}}</p>
		    </div>
		</div>
		<div class="form-group">
		    <label class="control-label"><span translate="workflow.domain"></span></label>
		    <div class="control-input">
		      <select multiple class="form-control">
				  <option  ng-repeat="title in model.vmTitles">{{title}}</option>
				</select>
		    </div>
		</div>
		<div class="form-group" ng-class="{'has-error':form.number.$dirty&&form.number.$invalid}">
		    <label class="control-label"><span translate="workflow.keepNumber"></span></label>
		    <div class="control-input">
			    <div class="input-group input-xlarge">
			    	<div class="input-group width260">
				        <input id= "number" name="number" type="text" style="width:226px;" spinner spinner-min=1 spinner-max=30 checkint ng-model="model.keepNumber">
				    </div>
				    <span class="input-group-addon help-addon" ng-messages="form.number.$error">
	                    <span ng-if="form.number.$valid||!form.number.$dirty">
	                        <span class="icon-occupying"></span>
	                    </span>
	                    <span ng-if="form.number.$dirty">
	                        <span ng-message="spinnerMax"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxValueIs'|translate}}30"></span></span>
					        <span ng-message="spinnerMin"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'minValueIs'|translate}}1"></span></span>
					        <span ng-message="int"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidint'|translate}}"></span></span>
	                    </span>
	           		</span>
			    </div>
		    </div>
		</div>
		<div class="form-group">
		    <label class="control-label"> <span translate="workflow.autoReplace"></span> </label>
		    <div class="control-input">
		    	<div class="input-group width260">
					<div toggle-switch class="switch-success" ng-model="autoReplacement" is-disabled=true></div>
				</div>
		    </div>
		</div>
		<div class="form-group" ng-class="{'has-error': (form.reason.$dirty && form.reason.$invalid)}">
		    <label class="control-label"><span translate="workflow.reason"></span></label>
		    <div class="control-input">
		    	<div class="input-group input-xlarge">
			      	<textarea class="form-control" name ="reason" rows="3" ng-maxlength=256  ng-model="model.reason" style="width:260px"></textarea>
			      	<span class="input-group-addon help-addon" ng-messages="form.reason.$error">
						<span ng-if="form.reason.$valid||!form.reason.$dirty">
							<span class="icon-occupying"></span>
						</span>
						<span ng-if="form.reason.$dirty">
							<span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}256"></span></span>
						</span>
					</span>
				</div>
		    </div>
		</div>
	</form>
</div>
 <div class="modal-footer">
	  <button id="okBtn" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
	  <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
 </div>
