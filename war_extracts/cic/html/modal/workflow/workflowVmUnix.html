<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
    <!-- vm
    <button type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" 
    	ng-click="openHelp('cloudService/cloudisk/handleWorkflow')">
		<span class="icon-helpnew"></span>
	</button>  -->
    <h4 class="modal-title"><span translate="workflow.vmImplement"></span></h4>
</div>
<!-- 内容 -->
<div class="modal-body row" id="handleWorkflow">
	<fieldset id="handleWorkflowInfo">
		<legend><h5 translate="common.baseInfo"></h5></legend>
		<div class="form-horizontal">
			<div class="form-group col-sm-12">
			    <div class="col-sm-1 control-label short"><span translate="cloudResource.vmName"></span></div>
			    <div class="col-sm-3">
			      <p class="form-control-static" custom-title shortcut cut-str="{{model.domainName}}">{{model.domainName}}</p>
			    </div>
			    <div class="col-sm-1 control-label short"><span translate="vm.displayName"></span></div>
			    <div class="col-sm-3">
			      <p class="form-control-static" custom-title shortcut cut-str="{{model.title}}">{{model.title}}</p>
			    </div>
			</div>
			<div class="form-group col-sm-12" ng-if ="model.memory != null">
			    <div class="col-sm-1 control-label short"><span translate="addDomain.cpuNum"></span></div>
			    <div class="col-sm-3">
			      <p class="form-control-static">{{model.cpuCores}}*{{model.cpuSockets}}</p>
			    </div>
			    <div class="col-sm-1 control-label short"><span translate="addDomain.memoryInit"></span></div>
			    <div class="col-sm-3">
			      <p class="form-control-static">{{model.memory|byteUnitRender}}</p>
			    </div>
			</div>
			<div class="form-group col-sm-12">
			    <div class="col-sm-1 control-label short"><span translate="host.version"></span></div>
			    <div class="col-sm-10">
			      <p class="form-control-static" custom-title shortcut cut-str="{{model.osVersion}}">{{model.osVersion}}</p>
			    </div>
			</div>
		</div>
	</fieldset>
	<fieldset ng-if="isDefineField" ng-init="isDefineField=false" id="handleWorkflowInfo">
		<legend><h5 translate="workflow.extendField"></h5></legend>
		<div class="form-horizontal">
	    	<div class="form-group col-sm-6" ng-repeat="field in defineFields">
	    		<div class="col-sm-1 control-label short gird-ellipsis" custom-title='{{field.fieldName}}'>{{field.fieldName}}</div>
		  		<div class="col-sm-3">
					<p class="form-control-static" custom-title shortcut cut-str="{{field.value}}">{{field.value}}</p>
				</div>
			</div>
		</div>
	</fieldset>
		<form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
		<fieldset >
			<legend><h5 translate="workflow.handle"></h5></legend>
			<div class="form-group" ng-class="{'has-error': (form.handleReason.$dirty && form.handleReason.$invalid)}">
				<label class="col-sm-1 control-label"><span translate="workflow.handleReason"></span></label>
				<div class="control-input">
					<div class="input-group input-xlarge">
						<textarea rows="2" class="form-control width260" ng-model="handleReason" ng-maxlength=256 name="handleReason" ></textarea>
						<span class="input-group-addon help-addon" ng-messages="form.handleReason.$error">
							<span ng-if="form.handleReason.$valid||!form.handleReason.$dirty">
								<span class="icon-occupying"></span>
							</span>
							<span ng-if="form.handleReason.$dirty">
								<span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}256"></span></span>
							</span>
						</span>
					</div>
				</div>
			</div>
		</fieldset>
		</form>
</div>
<div class="modal-footer">
	<button id="okBtn" class="btn btn-green"  ng-if="model.opType != 'view'"  ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
	<button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
