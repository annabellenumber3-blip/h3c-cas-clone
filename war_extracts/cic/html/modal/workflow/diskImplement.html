<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
    <button type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" 
    	ng-click="openHelp('cloudService/cloudisk/handleCloudiskWorkflow')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title"><span translate="workflow.diskImplement"></span></h4>
</div>
<!-- 内容 -->
<div class="modal-body row">
	<form name="form"  class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate >
		<div class="form-group">
		    <label class="control-label"><span translate="workflow.diskName"></span></label>
		    <div class="control-input">
		      <p class="form-control-static" custom-title shortcut short-width=250 cut-str="{{model.name}}">{{model.name}}</p>
		    </div>
		</div>
		<div class="form-group" ng-class="{'has-error':form.maxCapacity.$dirty&&form.maxCapacity.$invalid}">
		    <label class="control-label"><span translate="host.capacity"></span><span style="color:red;">*</span></label>
		    <div class="control-input">
			    <div class="input-group input-xlarge">
			    	<div class="input-group width260">
				        <input id= "modelCapacity" name="maxCapacity" type="text" style="width:180px;" spinner spinner-min=1  spinner-max=1024 ng-model="model.capacity" required checkint>
				        <span class="input-group-addon unit-addon last-child-angle">GB</span>
				    </div>
				    <span class="input-group-addon help-addon" ng-messages="form.maxCapacity.$error">
	                    <span ng-if="form.maxCapacity.$valid||!form.maxCapacity.$dirty">
	                        <span class="icon-occupying"></span>
	                    </span>
	                    <span ng-if="form.maxCapacity.$dirty">
	                        <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
	                        <span ng-message="spinnerMax"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxValueIs'|translate}}1024"></span></span>
					        <span ng-message="spinnerMin"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'minValueIs'|translate}}1"></span></span>
					        <span ng-message="int"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidint'|translate}}"></span></span>
	                    </span>
	           		</span>
			    </div>
		    </div>
		</div>
		<div class="form-group" ng-class="{'has-error': (form.reason.$dirty && form.reason.$invalid)}">
		    <label class="control-label"><span translate="workflow.reason"></span></label>
		    <div class="control-input">
		      	<div class="input-group input-xlarge">
		      		<textarea name="reason" class="form-control width260" rows="3" ng-maxlength=256  ng-model="model.reason" ></textarea>
			      	<span class="input-group-addon help-addon" ng-messages="form.reason.$error">
						<span ng-if="form.reason.$valid||!form.reason.$dirty">
							<span class="icon-occupying"></span>
						</span>
						<span ng-if="form.reason.$dirty">
							<span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}256"></span></span>
						</span>
					</span>
		      	</div>
		    </div>
		</div>
	</form>
</div>
 <div class="modal-footer">
	  <button id="okBtn" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
	  <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
 </div>
