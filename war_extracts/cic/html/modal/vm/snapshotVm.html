<!-- 虚拟机快照 -->
<div class="modal-header">
	 <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	
	<button ng-if="entryNodeType == 'cloudResource'" type="button" class="close cornerhelp" custom-title="{{::'help'|translate}}" ng-click="openHelp('cloudResource/vm/vmSnapshot')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="entryNodeType == 'cloudHost'" type="button" class="close cornerhelp" custom-title="{{::'help'|translate}}" ng-click="openHelp('cloudVm/vmSnapshot')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="entryNodeType == 'virtualDesktopPool'" type="button" class="close cornerhelp" custom-title="{{::'help'|translate}}" ng-click="openHelp('cloudService/virtualDesktopPool/desktop/vmSnapshot')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="entryNodeType == 'org'" type="button" class="close cornerhelp" custom-title="{{::'help'|translate}}" ng-click="openHelp('org/VM/vmSnapshot')">
		<span class="icon-helpnew"></span>
	</button>
	<h4 class="modal-title" translate="snapshot.snapshotMng"></h4>
</div>
<div class="modal-body" style="padding:0px 30px 20px 30px;">
    <!-- 搜索框 -->
	<label style="margin-top:10px;position:absolute; margin-left:455px;">
      <input class="form-control" id="snapshotInput" type="search" placeholder="{{'snapshotSearchHolder'|translate}}" ng-model="tmp.snapshotQuery" maxlength="64">
	</label>
	<div style="top:50px;position:relative;margin-bottom:50px;">
		 <div class="form-horizontal" style="border: 1px solid #EBEBEB;">
	        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
	            <div style="padding-left:10px;background-color:#d9edf7;color:#31708f;" translate="snapshot.snapshotHistory"></div>
	            <!-- 快照历史 -->
	            <div class="casTree" style="height:400px;" id="snapshotTree" cas-snapshot-tree select-snap="selectSnap">
			       <ul snapshot-tree-accordion style="padding:0px;">
			           <li snapshot-tree-link tree-id="snapshotTree" icon="icon-cloudresource" href="cloudResource.dashboard"
			               listhref="domain/snapshot/tree?id={{domain.id}}&orgId={{domain.orgId}}&cloudId={{domain.cloudId}}" text="" query="{{tmp.snapshotQuery}}"></li>
			       </ul>
			    </div>
			    <!-- 概要显示 -->
			    <div style="margin-left:10px;">
			      <span translate="snapshot.desc"></span><span shortcut cut-str="{{selectSnap.desc}}" short-width=520 custom-title>{{selectSnap.desc}}</span>
			    </div>
			    <div style="margin-left:10px;">
			      <span translate="snapshot.createTime"></span><span ng-bind="selectSnap.createTime"></span>
			    </div>
	        </form>
	    </div>
	</div>
   
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
    <button id="createBtn" class="btn btn-green"  ng-click="createSnap()" translate="snapshot.create"></button>
    <button id="restoreBtn" class="btn btn-green" ng-disabled="!selectSnap.text" ng-click="resoreSnap()" translate="snapshot.restore"></button>
    <button id="delBtn" class="btn btn-green" ng-disabled="!selectSnap.text" ng-click="deleteSnap()" translate="snapshot.delete"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
