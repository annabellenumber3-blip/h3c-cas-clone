<!-- 创建虚拟机快照弹出窗口 -->
<!-- 标题 -->
<div class="modal-header">
     <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <button type="button" class="close cornerhelp"  custom-title="{{'help'|translate}}" ng-click="openHelp('cloudResource/vm/vmSnapshot')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title" translate="snapshot.createSnap"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body">
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
            <!-- 名称 -->
            <div class="form-group" " ng-class="{'has-error': (form.name.$dirty && form.name.$invalid)}">
               <label for="name" class="control-label short"><span translate="common.name"></span><span style="color: red">*</span></label>
               <div class="control-input" >
                    <div class="input-group input-xlarge">
                        <input type="text" checkname ng-maxlength=100 class="form-input form-control" ng-model="snap.name"  ng-trim="false" id="name" name="name" required>
                        <span class="input-group-addon help-addon" ng-messages="form.name.$error">
                            <span ng-if="form.name.$valid||!form.name.$dirty">
                                <span class="icon-occupying"></span>
                            </span>
                            <span ng-if="form.name.$dirty">
                                <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
                                <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}100"></span></span>
                                <span ng-message="checkname"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'checkname'|translate}}"></span></span>
                            </span>
                        </span>
                    </div>
                </div>   
            </div>
            <!-- 描述 -->
            <div class="form-group" ng-class="{'has-error': (form.desc.$dirty && form.desc.$invalid)}">
               	<label for="desc" class="control-label short"><span translate="common.desc"></span><span style="color: red">&nbsp;</span></label>
              	<div class="control-input input-group input-xlarge">
                	<input type="text"  ng-maxlength=120 class="form-input form-control" ng-model="snap.desc"  ng-trim="false" id="desc" name="desc">
             		<span class="input-group-addon help-addon" ng-messages="form.desc.$error">
	                  	<span ng-if="form.desc.$valid||!form.desc.$dirty">
	                     	<span class="icon-occupying"></span>
	                 	</span>
	                 	<span ng-if="form.desc.$dirty">
	                   		<span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}120"></span></span>
	                  	</span>
               		</span>
              	</div>   
            </div>  
            <!-- 快照内存 -->
            <div class="form-group" ng-if="showSnapMem == true">
                 <label for="autoMigrate" class="control-label short switch-label"><span translate="snapshot.snapMem"></span></label>
                 <div class="control-input">
                    <div class="input-group">
		                 <div toggle-switch  class="switch-success" ng-model="snap.snapMem"></div>
	                    </div>
	                    </div>
	                 </div>
            <!-- 超时时间 -->
            <div class="form-group" ng-if="snap.snapMem==true" ng-class="{'has-error': (form.timeout.$dirty && form.timeout.$invalid)}">
                <label for="cpu_socket" class="control-label short">
                    <span translate="snapshot.timeout"></span><span style="color: red"></span>
                </label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input id= "timeout" name="timeout" checkint required spinner class="spinner-input" type="text" spinner-max=120 spinner-min=1 ng-model="snap.snapshotTimeout" ng-init='snap.snapshotTimeout=5' >
                        <span class="input-group-addon" translate="snapshot.minute"></span>
                        <span class="input-group-addon help-addon" ng-messages="form.timeout.$error">
                            <span ng-if="form.timeout.$valid||!form.timeout.$dirty">
                                <span class="icon-occupying"></span>
                            </span>
                            <span ng-if="form.timeout.$dirty">
                                <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
                                <span ng-message="spinnerMax"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxValueIs'|translate}}120"></span></span>
							    <span ng-message="spinnerMin"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'minValueIs'|translate}}1"></span></span>
							    <span ng-message="int"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidint'|translate}}"></span></span>
                            </span>
                        </span>
                    </div>
                </div>                                      
            </div>
        </form>
    </div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <button class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
