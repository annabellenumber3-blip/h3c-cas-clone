<!-- 操作员过滤弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
     <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="common.filter"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body">
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
	        <!-- 登录名 -->
	        <div class="form-group" ng-class="{'has-error': (form.loginName.$dirty && form.loginName.$invalid)}">
                <label for="loginName" class="control-label"><span translate="common.loginName"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group input-xlarge">
                        <input type="text" ng-maxlength=32 class="form-input form-control" ng-model="entry.loginName"  ng-trim="false" id="loginName" name="loginName">
                        <span class="input-group-addon help-addon" ng-messages="form.loginName.$error">
			                <span ng-if="form.loginName.$valid||!form.loginName.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.loginName.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}32"></span></span>
			                </span>
			             </span>
                    </div>
                </div>
            </div>
	        <!-- 操作员姓名 -->
	        <div class="form-group" ng-class="{'has-error': (form.userName.$dirty && form.userName.$invalid)}">
                <label for="operatorName" class="control-label"><span translate="common.operatorName"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group input-xlarge">
                        <input type="text" ng-maxlength=32 class="form-input form-control" ng-model="entry.userName"  ng-trim="false" id="operatorName" name="userName">
                         <span class="input-group-addon help-addon" ng-messages="form.userName.$error">
			                <span ng-if="form.userName.$valid||!form.userName.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.userName.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}32"></span></span>
			                </span>
			             </span>
                    </div>
                </div>
            </div>
	        <!-- login IP -->
	        <div class="form-group" ng-class="{'has-error': (form.loginIP.$dirty && form.loginIP.$invalid)}">
                <label for="email" class="control-label"><span translate="common.address"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group input-xlarge">
                        <input id="loginIP" type="text" ng-maxlength=32 class="form-input form-control" ng-model="entry.loginIP"  ng-trim="false" name="loginIP">
                         <span class="input-group-addon help-addon" ng-messages="form.loginIP.$error">
			                <span ng-if="form.loginIP.$valid||!form.loginIP.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.loginIP.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}32"></span></span>
			                </span>
			             </span>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
	<button class="btn btn-black" ng-click="reset()" translate="common.reset"></button>
    <button id="operatorFilterBtn" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
