<!-- 选择LDAP服务器 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="ldap.chooseLdapServer"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body list-body" >
    <div  ng-controller="ldapServerConfigListCtrl">
        <div id="serverConfigListDivId" style="width: 100%; height: 300px;" class="table"  ng-grid="gridOptions"></div>
	</div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <button id="addBtn" has-permission="LDAP_SERVER_ADD" class="btn btn-green" ng-click="addLdapServer()" translate="common.add"></button>
    <button id="okBtn" class="btn btn-green" ng-disabled="mySelections.length<1" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
