<!-- 注册License-->
<div class="modal-header">
	 <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	<button type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('sysMgmt/license/registerLicense')">
		<span class="icon-helpnew"></span>
	</button>
	<h4 class="modal-title" translate="licenseMng.registerLicense"></h4>
</div>
<div class="modal-body">
	<div class="form-horizontal">
		<div class="alert alert-info" role="alert" translate="downloadFileTip"></div>
		<form name="form" class="form-horizontal" ng-keypress="enter($event)"
			role="form" novalidate>
			<input type="hidden" id="form2" value="{{form3.$valid}}">
			<!-- 隐藏属性，用于js方法操作form是否显示
			<div translate="downloadFileTip" style="padding-top: 25px; padding-bottom: 20px; color: blue;"></div>
			 -->
			<div>
				<!-- 请选择License文件 -->
				<div class="form-inline" style="margin-bottom: 0; margin-top: 10;">
					<label class="control-label"><span
						translate="licenseMng.selectLicenseFile"></span> </label>
					<div class="control-input" id="license_select_files_btn">
						<div class="input-group">
							<input type="text" style="width: 201px !important;"
								class="form-input form-control first-child-angle selectInput"
								ng-model="licenseFilePath" ng-trim="false"
								id="licenseFilePath_id" name="licenseFilePath" required readonly>
							<span class="input-group-addon iconSearch last-child-angle"
								style="background: white; border-left: 0;"><span
								style="margin-left: 5px;" translate="addDomain.viewImage"></span>
							</span>
						</div>
					</div>
				</div>
				<div id="license_select_files_btn_alert"></div>
				<!-- 请选择License文件 -->
				<div id="license_select_files"style="display:none; ;">
					<span translate="licenseMng.registerTip"></span>
				</div>
				<div id="license_stream_files_queue" style="display:none;"></div>
				<div id="license_stream_message_container"style="display:none;"></div>
				<!-- 进度条 -->
				<div class="ngCellText" style="width: 400px;display:none;">
					<div class="progress progressgray"
						style="margin-top: 0; height: 20px;">
						<div
							class="progress-bar progress-bar-success progress-bar-striped"
							role="progressbar" aria-valuenow="{{progress | number:2}}"
							aria-valuemin="0" aria-valuemax="100" style="width: {{">
							<span style="margin-left: 10px;">{{progress | number:2}}%</span>
						</div>
					</div>
				</div>
				<label class="btn btn-default btn-menu" ng-click="stream.upload()" style="display:none;">
					<span class="sm-icon icon-upload"></span><span class="ng-scope"
					translate="licenseMng.upload"></span> </label>
			</div>
		</form>
	</div>
</div>

 <div class="modal-footer">
	  <button id="okBtn" class="btn btn-green" ng-disabled="form.$invalid || !isOk" ng-click="upload()" translate="common.confirm"></button>
	  <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
 </div>
