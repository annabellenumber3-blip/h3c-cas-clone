<!-- 增加操作员分组弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
     <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <button ng-if="type=='add' && !isChild" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('sysMgmt/operatorGroup/addOperatorGroup')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="type=='add' && isChild" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('sysMgmt/operatorGroup/addOperatorChildGroup')">
		<span class="icon-helpnew"></span>
	</button>
    <button ng-if="type=='modify'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('sysMgmt/operatorGroup/modifyOperatorGroup')">
		<span class="icon-helpnew"></span>
	</button>
    <button ng-if="type=='view'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('sysMgmt/operatorGroup/viewOperatorGroupDetail')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title" ng-bind="title"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body row" id="addOperatorGroupForm">
    <div class="form-horizontal col-md-8">
        <carousel-form titles="guidStep" cancel="ok()"> 
            <!-- 第一步 -->
            <slide-form valid="valids.stepOneOver()" active="slide.active">
		        <form name="form1" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
		            <!-- 隐藏属性，用于js方法操作form是否显示 -->
		            <input type="hidden" id="addOpGroupForm1" value="{{form1.$valid}}">
		            <!-- 分组名称 -->
		            <div class="form-group" ng-class="{'has-error': (form1.groupName.$dirty && form1.groupName.$invalid)}">
		                <label for="groupName" class="control-label"><span translate="operator.groupName"></span><span style="color: red">*</span></label>
		                <div class="control-input" >
		                     <div class="input-group input-xlarge">
		                         <input id="addGroup_1" type="text" check-special-char rpccheck="operator/existGroupName" ng-readonly="isShowOnly()" ng-maxlength=32 class="form-input form-control" ng-model="entry.name"  ng-trim="false" name="groupName" required>
		                         <span class="input-group-addon help-addon" ng-messages="form1.groupName.$error">
		                             <span ng-if="form1.groupName.$valid||!form1.groupName.$dirty">
		                                 <span class="icon-occupying"></span>
		                             </span>
		                             <span ng-if="form1.groupName.$dirty">
		                                 <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
		                                 <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}32"></span></span>
		                                 <span ng-message="specialChar"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'checkname2'|translate}}"></span></span>
		                                 <span ng-message="rpccheck"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'operator.existGroupName'|translate}}"></span></span>
		                             </span>
		                         </span>
		                     </div>
		                 </div>   
		            </div>
		            <!-- 分组描述 -->
		            <div class="form-group" ng-class="{'has-error': (form1.groupDesc.$dirty && form1.groupDesc.$invalid)}">
		                <label for="groupDesc" class="control-label"><span translate="operator.groupDesc"></span><span style="color: red">&nbsp;</span></label>
		                <div class="control-input" >
		                     <div class="input-group input-xlarge">
		                         <input id="addGroup_2" type="text" ng-readonly="isShowOnly()" ng-maxlength=120 class="form-input form-control" ng-model="entry.description"  ng-trim="false" name="groupDesc">
		                         <span class="input-group-addon help-addon" ng-messages="form1.groupDesc.$error">
		                             <span ng-if="form1.groupDesc.$valid||!form1.groupDesc.$dirty">
		                                 <span class="icon-occupying"></span>
		                             </span>
		                             <span ng-if="form1.groupDesc.$dirty">
		                                 <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}120"></span></span>
		                             </span>
		                         </span>
		                     </div>
		                 </div>   
		            </div>
		            <!-- manage child group -->
		            <div class="form-group" ng-if="entry.mode != 1 && entry.mode != 2">
		                 <label for="autoMigrate" class="switch-label"><span translate="operator.enableMngChildGrp"></span></label>
		                 <div class="control-input">
		                    <div class="input-group">
				                 <div id="addGroup_3_div" toggle-switch  class="switch-success" ng-model="entry.flag" is-disabled="type=='view'"></div>
		               		</div>
		              	 </div>
		            </div>
		        </form>
	        </slide-form>
            <!-- 第二步 -->
            <slide-form valid="valids.stepTwoOver()">
                <form name="form2" class="form-horizontal" role="form" novalidate>
                    <!-- 隐藏属性，用于js方法操作form是否显示 -->
                    <input type="hidden" id="addOpGroupForm2" value="{{form2.$valid}}">
                    <!-- 操作员权限 -->
                    <div cas-permission-tree id="groupPermissionTree" style="height:280px;overflow-y:auto;" type="{{type}}" bind-model="selectNodes" disable-all="{{isShowOnly() == true || modefyDefault == true}}" class="treeview"></div>
                </form>
            </slide-form>
        </carousel-form>
    </div>
    <!-- 右侧确认信息 -->
    <div class="detail-table col-md-4">
        <table class="table table-striped">
            <tr class="gray">
                <td><h4 translate="configDetail"></h4></td><td></td>
            </tr>
            <tr class="white">
                <td><span translate="operator.groupName"></span></td>
                <td><span ng-bind="entry.name" custom-title shortcut cut-str="{{entry.name}}"></span></td>
            </tr>
            <tr class="gray">
                <td><span translate="operator.groupDesc"></span></td>
                <td><span ng-bind="entry.description" custom-title shortcut cut-str="{{entry.description}}"></span></td>
            </tr>
            <tr class="white" ng-if="entry.mode != 1 && entry.mode != 2">
                <td><span translate="operator.enableMngChildGrp"></span></td>
                <td><span ng-bind="entry.flag==1 | yes"></span></td>
            </tr>            
        </table>
    </div>
</div>
