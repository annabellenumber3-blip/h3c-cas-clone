<!-- 增加用户弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	<button ng-if="type=='add'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('usrMgmt/user/addUser')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="type=='orgAdd'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('org/user/addUserInOrg')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="type=='modify'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('usrMgmt/user/modifyUser')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="type=='view'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('usrMgmt/user/viewUserDetail')">
		<span class="icon-helpnew"></span>
	</button>
	<h4 ng-if="type=='add'" class="modal-title" translate="user.addUser"></h4>
    <h4 ng-if="type=='orgAdd'" class="modal-title" translate="user.addUser"></h4>
    <h4 ng-if="type=='modify'" class="modal-title" translate="user.modifyUser"></h4>
    <h4 ng-if="type=='view'" class="modal-title" translate="user.viewUser"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body" style="padding-bottom:0;">
<!-- 	<div class="alert alert-info alert-margin" role="alert" translate="user.userinfoAlert"></div> -->
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" style="margin-bottom:0;" novalidate>
	        <!-- 登录名 -->
	        <div class="form-group" ng-class="{'has-error': (form.loginName.$dirty && form.loginName.$invalid)}">
                <label for="loginName" class="control-label"><span translate="common.loginName"></span><span style="color: red">*</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=128 class="form-input form-control" ng-model="entry.loginName"  ng-trim="false" id="loginName" name="loginName" required check-user-loginname
                        check-start-space check-end-space ng-if="type=='add'" rpccheck="user/loginName/exist" namekey="loginName">
                        <input type="text" ng-maxlength=128 class="form-input form-control" ng-model="entry.loginName"  ng-trim="false" id="loginName" name="loginName" required check-user-loginname
                        check-start-space check-end-space ng-if='type!="add"' rpccheck="user/loginName/exist" namekey="loginName" nocheck="{{type=='view'}}"  ng-readonly="type=='view' || securityMode == 1">
                        
                        <span class="input-group-addon help-addon" ng-messages="form.loginName.$error">
			                <span ng-if="form.loginName.$valid||!form.loginName.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.loginName.$dirty">
			                    <span ng-message="userLoginname"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'checkname4'|translate}}"></span></span>
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}128"></span></span>
			                    <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			               		<span ng-message="rpccheck"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'user.loginNameExist'|translate}}"></span></span>
			               		<span ng-message="startSpace"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'startSpace'|translate}}"></span></span>
			               		<span ng-message="endSpace"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'endSpace'|translate}}"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
	        <!-- 认证方式 -->
	        <div class="form-group">
                <label for="authMode" class="control-label"><span translate="operator.authMode"></span><span style="color:red">*</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" class="form-input form-control" ng-model="entry.authMode"  ng-trim="false" id="authMode" name="authMode" readonly>
                    </div>
                </div>
            </div>
            <!-- 选择LDAP策略 -->
	        <div class="form-group" ng-if="entry.authType == 1">
                <label for="organization" class="control-label"><span translate="ldap.ldapStras"></span><span style="color: red">*</span></label>
                <div class="control-input">
                	<div>                	
	                    <div class="input-group width260" ng-click="ldapStrategySelector()" ng-if="type!='view'">
	                        <input type="text" class="form-control selectInput" ng-model="entry.ldapName"  ng-trim="false" id="ldapStrategy" name="ldapStrategy" readonly>
	                        <span class="input-group-addon inner-addon">
	                              <span class="icon-search-gray" type="button" style="cursor:pointer;"></span>
	                        </span>
	                    </div>
	                    <div class="input-group width260" ng-if="type=='view'">
	                        <input type="text" class="form-control" ng-model="entry.ldapName"  ng-trim="false" id="ldapStrategy" name="ldapStrategy" readonly>
	                    </div>
                	</div>
                </div>
            </div>
            
            <!-- 登录密码 -->
	        <div class="form-group" ng-if="entry.authType == 0" ng-hide="type=='view'" ng-class="{'has-error': (form.loginPwd.$dirty && form.loginPwd.$invalid)}">
                <label for="loginPwd" class="control-label"><span translate="user.loginPwd"></span><span style="color: red">*</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="password" ng-maxlength=32 class="form-input form-control" ng-model="entry.loginPwd"  ng-trim="false" id="loginPwd" name="loginPwd" required check-notblank
                        ng-readonly="type=='view'">
                        <span class="input-group-addon help-addon" ng-messages="form.loginPwd.$error">
			                <span ng-if="form.loginPwd.$valid||!form.loginPwd.$dirty">
			                    <span class="icon-help-gray" tooltip-placement="right" tooltip="{{'user.loginPwdTip'|translate}}"></span>
			                </span>
			                <span ng-if="form.loginPwd.$dirty">
			                    <span ng-message="notblank"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'invalidpwd'|translate}}"></span></span>
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                	<span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
            <!-- 确认密码 -->
	        <div class="form-group" ng-if="entry.authType == 0" ng-hide="type=='view'" ng-class="{'has-error': (form.checkPwd.$dirty && form.checkPwd.$invalid)}">
                <label for="checkPwd" class="control-label"><span translate="user.checkPwd"></span><span style="color: red">*</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input equalcheck obj1="entry.checkPwd" obj2="entry.loginPwd" considerspace=true type="password" ng-maxlength=32 class="form-input form-control" ng-model="entry.checkPwd"  ng-trim="false" id="checkPwd" name="checkPwd" required
                        ng-readonly="type=='view'">
                        <span class="input-group-addon help-addon" ng-messages="form.checkPwd.$error">
			                <span ng-if="form.checkPwd.$valid||!form.checkPwd.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.checkPwd.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                	<span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			               		<span ng-message="equalcheck"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'pwdMatch'|translate}}"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
	        <!-- 用户姓名 -->
	        <div class="form-group" ng-class="{'has-error': (form.userName.$dirty && form.userName.$invalid)}">
                <label for="userName" class="control-label"><span translate="user.userName"></span><span style="color: red">*</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=128 class="form-input form-control" ng-model="entry.userName"  ng-trim="false" id="userName" name="userName" required ng-readonly="type=='view'">
                        <span class="input-group-addon help-addon" ng-messages="form.userName.$error">
			                <span ng-if="form.userName.$valid||!form.userName.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.userName.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}128"></span></span>
			                	<span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
            <!-- 证件号码 -->
	        <div class="form-group" ng-class="{'has-error': (form.idNumber.$dirty && form.idNumber.$invalid)}">
                <label for="idNumber" class="control-label"><span translate="user.idNumber"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=32 class="form-input form-control" ng-model="entry.idNumber"  ng-trim="false" id="idNumber" name="idNumber" ng-readonly="type=='view'">
                        <span class="input-group-addon help-addon" ng-messages="form.idNumber.$error">
			                <span ng-if="form.idNumber.$valid||!form.idNumber.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.idNumber.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
	        <!-- E-mail -->
	        <div class="form-group" ng-class="{'has-error': (form.email.$dirty && form.email.$invalid)}">
                <label for="email" class="control-label"><span>E-mail</span><span style="color: red">*</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input ng-if="type=='add'" type="text" checkemail ng-maxlength=128 class="form-input form-control" ng-model="entry.email"  ng-trim="false" id="email" name="email" required
                        rpccheck="user/email/exist" namekey="email">
                        <input ng-if="type!='add'"type="text" checkemail ng-maxlength=128 class="form-input form-control" ng-model="entry.email"  ng-trim="false" id="email" name="email" required
                        rpccheck="user/email/exist" namekey="email" nocheck="type=='view'"  ng-readonly="type=='view'">
                        <span class="input-group-addon help-addon" ng-messages="form.email.$error">
			                <span ng-if="form.email.$valid||!form.email.$dirty">
			                    <span class="icon-help-gray" tooltip-placement="right" tooltip="{{'user.emailTip'|translate}}"></span>
			                </span>
			                <span ng-if="form.email.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}128"></span></span>
			                	<span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			                	<span ng-message="checkemail"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'invalidemail'|translate}}"></span></span>
			                	<span ng-message="rpccheck"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'user.emailExist'|translate}}"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
             <!-- 组织 -->
	        <div class="form-group">
                <label for="organization" class="control-label"><span translate="user.organization"></span><span style="color: red">*</span></label>
                <div class="control-input">
                	<div ng-if="type!='orgAdd'">                	
	                    <div class="input-group width260" ng-click="orgSelector()" ng-if="type!='view'">
	                        <input type="text" class="form-control selectInput" ng-model="entry.organization"  ng-trim="false" id="organization" name="organization" readonly>
	                        <span class="input-group-addon inner-addon">
	                              <span class="icon-search-gray" type="button" style="cursor:pointer;"></span>
	                        </span>
	                    </div>
	                    <div class="input-group width260" ng-if="type=='view'">
	                        <input type="text" class="form-control" ng-model="entry.organization"  ng-trim="false" id="organization" name="organization" readonly>
	                    </div>
                	</div>
                	<div ng-if="type=='orgAdd'" class="input-group width260">
                        <input type="text" class="form-control form-control" ng-model="entry.organization"  ng-trim="false" id="organization" name="organization" readonly>
                    </div>
                </div>
            </div>
             <!-- 电话 -->
	        <div class="form-group" ng-class="{'has-error': (form.phone.$dirty && form.phone.$invalid)}">
                <label for="phone" class="control-label"><span translate="user.phone"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=32 check-phone class="form-input form-control" ng-model="entry.phone"  ng-trim="false" id="phone" name="phone" ng-readonly="type=='view'">
                        <span class="input-group-addon help-addon" ng-messages="form.phone.$error">
			                <span ng-if="form.phone.$valid||!form.phone.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.phone.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                	<span ng-message="checkPhone"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidPhone'|translate}}"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
             <!-- 通信地址 -->
	        <div class="form-group" ng-class="{'has-error': (form.mailingAddress.$dirty && form.mailingAddress.$invalid)}">
                <label for="mailingAddress" class="control-label"><span translate="user.mailingAddress"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=64 class="form-input form-control" ng-model="entry.mailingAddress"  ng-trim="false" id="mailingAddress" name="mailingAddress" ng-readonly="type=='view'">
                        <span class="input-group-addon help-addon" ng-messages="form.mailingAddress.$error">
			                <span ng-if="form.mailingAddress.$valid||!form.mailingAddress.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.mailingAddress.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}64"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
            
	        <!-- 用户分组 -->
            <div class="form-group" ng-class="{'has-error': (form.userGroup.$dirty && form.userGroup.$invalid)}">
		        <label for="userGroup" class="control-label"><span translate="user.userGroup"></span><span style="color: red">*</span></label>
		            <div class="control-input">
		                <div class="input-group input-xlarge" >
		                    <div class="input-group width260" ng-if="type!='view'" ng-click="userGrpSelector()">
		                    	<input type="text" style="width:219px" ng-maxlength=120 class="form-control selectInput" ng-model="entry.userGroup" ng-trim="false" id="userGroup" name="userGroup" required>
			                    <span class="input-group-addon inner-addon">
	                                <span class="icon-search-gray" type="button" style="cursor:pointer;"></span>
	                            </span>
		                    </div>
		                    <div class="input-group width260" ng-if="type=='view'">
		                    	<input type="text" class="form-control" ng-model="entry.userGroup"  ng-trim="false" id="userGroup" name="userGroup" readonly>
		                    </div>
		                    <span class="input-group-addon help-addon" ng-messages="form.userGroup.$error">
		                    	<span ng-if="form.userGroup.$valid||!form.userGroup.$dirty">
			                    	<span class="icon-help-gray" tooltip-placement="right" tooltip="{{'user.selectUserGrpTip'|translate}}"></span>
			                	</span>
		                        <span ng-if="form.userGroup.$dirty">
		                            <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'require'|translate}}"></span></span>
		                        </span>
		                    </span>
		                </div>
		            </div>
		       </div>
        </form>
    </div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <button id="userFilterBtn" class="btn btn-green" ng-if="type!='view'" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
