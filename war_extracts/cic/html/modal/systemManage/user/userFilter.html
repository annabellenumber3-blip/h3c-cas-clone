<!-- 用户过滤弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
    <h4 class="modal-title" translate="common.filter"></h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body">
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
	        <!-- 登录名 -->
	        <div class="form-group" ng-class="{'has-error': (form.loginName.$dirty && form.loginName.$invalid)}">
                <label for="loginName" class="control-label"><span translate="common.loginName"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=32 class="form-input form-control" ng-model="entry.loginName"  ng-trim="false" id="loginName" name="loginName">
                        <span class="input-group-addon help-addon" ng-messages="form.loginName.$error">
			                <span ng-if="form.loginName.$valid||!form.loginName.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.loginName.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
	        <!-- 认证方式 -->
	        <div class="form-group">
                <label for="authMode" class="control-label"><span translate="operator.authMode"></span><span style="color:red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <select-input class="" options="authMode.options" bind-model="entry.authType" input-id="authMode" input-name="authMode">
                        </select-input>
                    </div>
                </div>
            </div>
	        <!-- 用户姓名 -->
	        <div class="form-group" ng-class="{'has-error': (form.userName.$dirty && form.userName.$invalid)}">
                <label for="userName" class="control-label"><span translate="user.userName"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=32 class="form-input form-control" ng-model="entry.userName"  ng-trim="false" id="userName" name="userName">
                        <span class="input-group-addon help-addon" ng-messages="form.userName.$error">
			                <span ng-if="form.userName.$valid||!form.userName.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.userName.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
            <!-- 证件号码 -->
	        <div class="form-group" ng-class="{'has-error': (form.idNumber.$dirty && form.idNumber.$invalid)}">
                <label for="idNumber" class="control-label"><span translate="user.idNumber"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=32 class="form-input form-control" ng-model="entry.credentialNumber"  ng-trim="false" id="idNumber" name="idNumber">
                        <span class="input-group-addon help-addon" ng-messages="form.idNumber.$error">
			                <span ng-if="form.idNumber.$valid||!form.idNumber.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.idNumber.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
	        <!-- 用户分组 -->
	        <div class="form-group">
                <label for="userGroup" class="control-label"><span translate="user.userGroup"></span><span style="color:red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <select-input class="" options="userGroup" bind-model="entry.userGroupId" input-id="userGroup" input-name="userGroup">
                        </select-input>
                    </div>
                </div>
            </div>
            <!-- LDAP策略名称 -->
	        <div class="form-group">
                <label for="ldapStrategyName" class="control-label"><span translate="user.ldapStrategyName"></span><span style="color:red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <select-input class="" options="ldapStrategy" bind-model="entry.ldapSyncConfigId" input-id="ldapStrategyName" input-name="ldapStrategyName">
                        </select-input>
                    </div>
                </div>
            </div>
	        <!-- E-mail -->
	        <div class="form-group">
                <label for="email" class="control-label"><span>E-mail</span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=130 class="form-input form-control" ng-model="entry.email"  ng-trim="false" id="email" name="email">
                        <span class="input-group-addon help-addon" ng-messages="form.email.$error">
			                <span ng-if="form.email.$valid||!form.email.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.email.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
             <!-- 组织 -->
	        <div class="form-group" ng-class="{'has-error': (form.organization.$dirty && form.organization.$invalid)}">
                <label for="organization" class="control-label"><span translate="user.organization"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=130 class="form-input form-control" ng-model="entry.organization"  ng-trim="false" id="organization" name="organization">
                        <span class="input-group-addon help-addon" ng-messages="form.organization.$error">
			                <span ng-if="form.organization.$valid||!form.organization.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.organization.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
             <!-- 电话 -->
	        <div class="form-group" ng-class="{'has-error': (form.phone.$dirty && form.phone.$invalid)}">
                <label for="phone" class="control-label"><span translate="user.phone"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=130 class="form-input form-control" ng-model="entry.phone"  ng-trim="false" id="phone" name="phone">
                        <span class="input-group-addon help-addon" ng-messages="form.phone.$error">
			                <span ng-if="form.phone.$valid||!form.phone.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.phone.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
             <!-- 用户状态 -->
	        <div class="form-group">
                <label for="userStatus" class="control-label"><span translate="user.userStatus"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <select-input class="" options="userStatus.options" bind-model="entry.userStatus" input-id="userStatus" input-name="userStatus">
                        </select-input>
                    </div>
                </div>
            </div>
             <!-- 通信地址 -->
	        <div class="form-group" ng-class="{'has-error': (form.mailingAddress.$dirty && form.mailingAddress.$invalid)}">
                <label for="mailingAddress" class="control-label"><span translate="user.mailingAddress"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=130 class="form-input form-control" ng-model="entry.address"  ng-trim="false" id="mailingAddress" name="mailingAddress">
                        <span class="input-group-addon help-addon" ng-messages="form.mailingAddress.$error">
			                <span ng-if="form.mailingAddress.$valid||!form.mailingAddress.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.mailingAddress.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
	<button class="btn btn-green" ng-click="reset()" translate="common.reset"></button>
    <button id="userFilterBtn" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
