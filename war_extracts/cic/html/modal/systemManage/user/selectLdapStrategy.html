<!-- 选择LDAP策略弹出窗口 -->
<div class="modal-header">
	<button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	<button type="button" class="close cornerhelp" custom-title="帮助" ng-click="openHelp('sysMgmt/ldap/ldapSyncConfig/queryLdapSyncConfigList')">
		<span class="icon-helpnew"></span>
	</button>
	<h4 class="modal-title" translate="ldap.ldapStras"></h4>
</div>
<div class="modal-body list-body">
    <div style="width: 100%; height: 350px;" class="table"  ng-grid="gridOptions"></div>
</div>
<!-- 按钮栏 -->
<div class="modal-footer">
	<button id="addBtn" class="btn btn-green"  ng-click="addStrategy()" translate="common.add"></button>
    <button id="okBtn" class="btn btn-green"  ng-click="ok()" ng-disabled="mySelections.length<1" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
