<!-- 增加用户分组弹出窗口 -->

<!-- 标题 -->
<div class="modal-header">
    <button type="button" class="close" custom-title="{{::'common.close'|translate}}"  ng-click="cancel()">
		<span class="icon-closenew"></span>
	</button>
	<button ng-if="type=='addGrp'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('usrMgmt/userGroup/addUserGroup')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="type=='addChildGrp'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('usrMgmt/userGroup/addUserChildGroup')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="type=='orgAddGrp'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('org/userGroup/addUserGroupInOrg')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="type=='modify'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('usrMgmt/userGroup/modifyUserGroup')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="type=='view'" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('usrMgmt/userGroup/viewUserGroupDetail')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title">{{title}}</h4>
</div>
<!-- 内容1:单form -->
<div class="modal-body">
	<div class="alert alert-info alert-margin" role="alert" translate="user.userGrpAlert"></div>
    <div class="form-horizontal">
        <form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
	        <!-- 父分组 -->
	        <div class="form-group">
                <label for="parentGrp" class="control-label"><span translate="user.parentGrp"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" class="form-input form-control" ng-model="entry.parentGrp"  ng-trim="false" id="parentGrp" name="parentGrp" readonly>
                        <span class="input-group-addon help-addon" ng-messages="form.parentGrp.$error">
			                <span ng-if="form.parentGrp.$valid||!form.parentGrp.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
	      
	        <!-- 分组名 -->
	        <div class="form-group" ng-class="{'has-error': (form.name.$dirty && form.name.$invalid)}">
                <label for="name" class="control-label"><span translate="operator.groupName"></span><span ng-if="type!='view'" style="color: red">*</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=32 class="form-input form-control" ng-model="entry.name"  ng-trim="false" id="name" name="name" check-special-char required ng-readonly="type==='view'">
                        <span class="input-group-addon help-addon" ng-messages="form.name.$error">
			                <span ng-if="form.name.$valid||!form.name.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.name.$dirty">
			                	<span ng-message="specialChar"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'checkname2'|translate}}"></span></span>
			                	<span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}32"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
	        <!-- 分组描述 -->
	        <div class="form-group" ng-class="{'has-error': (form.description.$dirty && form.description.$invalid)}">
                <label for="description" class="control-label"><span translate="operator.groupDesc"></span><span style="color: red">&nbsp;</span></label>
                <div class="control-input">
                    <div class="input-group width260">
                        <input type="text" ng-maxlength=256 class="form-input form-control" ng-model="entry.description"  ng-trim="false" id="description" name="description" ng-readonly="type==='view'">
                        <span class="input-group-addon help-addon" ng-messages="form.description.$error">
			                <span ng-if="form.description.$valid||!form.description.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.description.$dirty">
			                    <span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'maxlen'|translate}}256"></span></span>
			                </span>
			            </span>
                    </div>
                </div>
            </div>
             <!-- 组织 -->
	        <div class="form-group">
                <label for="organization" class="control-label"><span translate="user.organization"></span><span ng-if="type!='view'" style="color: red">*</span></label>
                <div class="control-input">
                    <div ng-if="type==='addGrp'||(type=='modify'&&entry.parentGrp=='/'&&!entry.isHasUser&&!entry.hasChildren)" class="input-group input-xlarge" ng-click="orgSelector()">
                        <div class="input-group width260">
                        	<input type="text" class="form-control selectInput" ng-model="entry.orgName"  ng-trim="false" id="organization" name="organization" readonly required>
	                        <span class="input-group-addon inner-addon">
	                              <span class="icon-search-gray" type="button" style="cursor:pointer;" ></span>
	                        </span>
                        </div>
                        <span class="input-group-addon help-addon" ng-messages="form.organization.$error">
			                <span ng-if="form.organization.$valid||!form.organization.$dirty">
			                    <span class="icon-occupying"></span>
			                </span>
			                <span ng-if="form.organization.$dirty">
			                    <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'required'|translate}}"></span></span>
			                </span>
			            </span>
                    </div>
                    <div ng-if="type==='addChildGrp'||type==='view'|| type=='orgAddGrp'||(type==='modify'&&(entry.parentGrp!='/'||entry.isHasUser||entry.hasChildren))" class="input-group width260">
                        <input type="text" class="form-control form-control" ng-model="entry.orgName"  ng-trim="false" id="organization" name="organization" readonly>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- 内容1:按钮栏 -->
<div class="modal-footer">
    <button ng-if="type!='view'" id="userFilterBtn" class="btn btn-green" ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
    <button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
