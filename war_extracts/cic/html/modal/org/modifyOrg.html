<!-- 修改组织 -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
	<button type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('org/modifyOrg')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title"><span translate="org.modify"></span></h4>
</div>
<!-- 内容 -->
<div class="modal-body">
	<div class="alert alert-info" role="alert" translate="org.modifyHead"></div>
	
	<form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate>
		<!-- 组织名称 -->
		<div class="form-group">
		   	<label class="control-label"><span translate="org.name"></span></label>
			<p class="form-control-static">{{model.name}}</p>
		</div>	
		<!-- 组织描述 -->
		<div class="form-group" ng-class="{'has-error': (form.description.$dirty && form.description.$invalid)}">
		   	<label class="control-label"><span translate="org.desc"></span></label>
			<div class="control-input input-group input-xlarge">
			 	<input type="text" ng-maxlength=120 class="form-input form-control" ng-model="model.description"  ng-trim="false" id="description" name="description">
				<span class="input-group-addon help-addon" ng-messages="form.description.$error">
					<span ng-if="form.description.$valid||!form.description.$dirty">
						<span class="icon-occupying"></span>
					</span>
					<span ng-if="form.description.$dirty">
						<span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}120"></span></span>
					</span>
				</span>
			</div>
		</div>
		<!-- 显示名称前缀 -->
		<div class="form-group" ng-class="{'has-error': (form.domainPreName.$dirty && form.domainPreName.$invalid)}">
		   	<label class="control-label"><span translate="org.namePre"></span></label>
			<div class="control-input input-group input-xlarge">
				<input check-special-char type="text" ng-maxlength=20 class="form-input form-control" ng-model="model.domainPreName"  ng-trim="false" id="domainPreName" name="domainPreName">
				<span class="input-group-addon help-addon" ng-messages="form.domainPreName.$error">
					<span ng-if="form.domainPreName.$valid||!form.domainPreName.$dirty">
						<span class="icon-occupying"></span>
					</span>
					<span ng-if="form.domainPreName.$dirty">
						<span ng-message="maxlength"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxlen'|translate}}20"></span></span>
						<span ng-message="specialChar"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'checkname2'|translate}}"></span></span>
					</span>
				</span>
			</div>
		</div>
		<!-- 虚拟机个数 -->
		<div class="form-group" ng-class="{'has-error': (form.modelMaxVmNum.$dirty && form.modelMaxVmNum.$invalid)}">
		   	<label class="control-label"><span translate="org.vmNum"></span><span style="color:red;">*</span></label>
			<div class="control-input input-group input-xlarge">
				<input id= "modelMaxVmNum" name= "modelMaxVmNum" type="text" class="spinner-only" checkint required spinner spinner-min="{{model.vmNum}}" spinner-max="2048" ng-model="model.maxVmNum">
				<span class="input-group-addon help-addon" ng-messages="form.modelMaxVmNum.$error">
					<span ng-if="form.modelMaxVmNum.$valid||!form.modelMaxVmNum.$dirty">
						<span class="icon-occupying"></span>
					</span>
					<span ng-if="form.modelMaxVmNum.$dirty">
					    <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			            <span ng-message="spinnerMax"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxValueIs'|translate}}2048"></span></span>
			            <span ng-message="spinnerMin"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'minValueIs'|translate}}{{model.vmNum}}"></span></span>
			            <span ng-message="int"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidint'|translate}}"></span></span>
					</span>
				</span>
			</div>
		</div>
		<!-- CPU核数 -->
		<div class="form-group" ng-class="{'has-error': (form.modelMaxCpuNum.$dirty && form.modelMaxCpuNum.$invalid)}">
		   	<label for="modelMaxCpuNum" class="control-label"><span translate="org.cpuNum"></span><span style="color:red;">*</span></label>
		   	<div class="control-input">
				<div class="input-group width260">
					<input id= "modelMaxCpuNum" name="modelMaxCpuNum" type="text" class="spinner-only" checkint required spinner spinner-min="{{model.minCpuNum}}"  spinner-max=4096  ng-model="model.maxCpuNum">
					<span class="input-group-addon help-addon" ng-messages="form.modelMaxCpuNum.$error">
						<span ng-if="form.modelMaxCpuNum.$valid||!form.modelMaxCpuNum.$dirty">
							<span class="icon-occupying"></span>
						</span>
						<span ng-if="form.modelMaxCpuNum.$dirty">
						    <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			            	<span ng-message="spinnerMax"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxValueIs'|translate}}4096"></span></span>
			            	<span ng-message="spinnerMin"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'minValueIs'|translate}}{{model.minCpuNum}}"></span></span>
			            	<span ng-message="int"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidint'|translate}}"></span></span>
						</span>
					</span>
				</div>
		   	</div>
		</div>
		<!-- 内存数量 -->
		<div class="form-group" ng-class="{'has-error': (form.modelmaxMemNum.$dirty && form.modelmaxMemNum.$invalid)}">
		   	<label class="control-label"><span translate="org.memNum"></span><span style="color:red;">*</span></label>
			<div class="input-group">
				<input id= "modelmaxMemNum" name="modelmaxMemNum" type="text" style="width:180px !important;" checkint required spinner spinner-min="{{model.minMemNum}}" spinner-max=4096 ng-model="model.maxMemNum">
				<span class="input-group-addon unit-addon"  style="width:46px;">GB</span>
				<span class="input-group-addon help-addon" ng-messages="form.modelmaxMemNum.$error">
						<span ng-if="form.modelmaxMemNum.$valid||!form.modelmaxMemNum.$dirty">
							<span class="icon-occupying"></span>
						</span>
						<span ng-if="form.modelmaxMemNum.$dirty">
						    <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			            	<span ng-message="spinnerMax"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxValueIs'|translate}}4096"></span></span>
			            	<span ng-message="spinnerMin"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'minValueIs'|translate}}{{model.minMemNum}}"></span></span>
			            	<span ng-message="int"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidint'|translate}}"></span></span>
						</span>
					</span>
			</div>
		</div>
		<!-- 存储数量 -->
		<div class="form-group" ng-class="{'has-error': (form.modelmaxStorageNum.$dirty && form.modelmaxStorageNum.$invalid)}">
		   	<label class="control-label"><span translate="org.storgaeNum"></span><span style="color:red;">*</span></label>
		   	<div class="control-input">
				<div class="input-group">
					<input id= "modelmaxStorageNum" name="modelmaxStorageNum" type="text" style="width:180px !important;" checkint required spinner spinner-min="{{model.minStorageNum}}" spinner-max="2097152" ng-model="model.maxStorageNum">
					<span class="input-group-addon unit-addon" style="width:46px;">GB</span>
					<span class="input-group-addon help-addon" ng-messages="form.modelmaxStorageNum.$error">
						<span ng-if="form.modelmaxStorageNum.$valid||!form.modelmaxStorageNum.$dirty">
							<span class="icon-occupying"></span>
						</span>
						<span ng-if="form.modelmaxStorageNum.$dirty">
						    <span ng-message="required"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{::'require'|translate}}"></span></span>
			            	<span ng-message="spinnerMax"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'maxValueIs'|translate}}2097152"></span></span>
			            	<span ng-message="spinnerMin"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'minValueIs'|translate}}{{model.minStorageNum}}"></span></span>
			            	<span ng-message="int"><span class="fa fa-exclamation-triangle" tooltip-placement="right" tooltip="{{'invalidint'|translate}}"></span></span>
						</span>
					</span>
				</div> 
		   	</div>
		</div>
		<!-- 虚拟机备用存储池 -->
		<div class="form-group" ng-if="model.cloudType == 2">
		   	<label class="control-label"><span translate="org.backStorage"></span></label>
			<div class="control-input input-group width260">
				<select-input class="" options="storageOptions" bind-model="tmp.backupDestNum" input-id="storage" input-name="storage"></select-input>
			</div>
		</div>
		<!-- 允许修改配置 -->
		<div class="form-group">
						<label class="col-sm-1 control-label" translate="org.enableModifyConfig"></label>
						<div class="control-input">
							<div class="input-group">
								<div toggle-switch class="switch-success" ng-model="model.enableAdjustSetting"></div>
								<span class="input-group-addon help-addon">
									<span class="icon-help-gray" custom-title="{{'org.enableAdjustSetting' | translate}}"></span>
								</span>
							</div>
						</div>
		</div>
		<!-- <div class="form-group">
		   	<label class="control-label"><span translate="">&nbsp;</span></label>
			<div class="control-input checkbox">
				<label>
					<input type="checkbox" name="awesome" ng-model="model.enableAdjustSetting" ng-true-value="1" ng-false-value="0">
					<span translate="org.enableAdjustSetting"></span>
				</label>
			</div>
		</div> -->
	</form>
</div>
<div class="modal-footer">
	<button id="okBtn" class="btn btn-green"  ng-if="model.opType != 'view'"  ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
	<button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
