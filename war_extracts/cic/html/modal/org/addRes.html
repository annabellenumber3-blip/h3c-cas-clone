
<!-- 增加计算资源 -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
	<button type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('org/cluster/addClusterInOrg')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title"><span translate="org.addResource"></span></h4>
</div>
<div class="modal-body row">
    <div class="form-horizontal col-md-8">
	    <carousel-form titles="stepTitles" cancel="ok()"> 
    	<!-- 选择集群 -->
	    	<slide-form valid="valids.stepOneOver()" active="slide.active">
                <div style="width: 100%;height: 200px;" class="table"  ng-grid="gridOptions"></div>
        	</slide-form>
	    <!-- 选择网络资源 -->
	    	<slide-form valid="valids.stepTwoOver()">
               	<div class="">
					<div  ng-class="{true: 'tab-pane fade in active', false: 'tab-pane fade'}" id="vswitch">
						<div style="height: 200px;width: 530px;" class="table"  ng-grid="vswitchOptions"></div>
					</div>
			    </div>
        	</slide-form>
        <!-- 选择存储资源 -->
        	<slide-form valid="valids.stepThreeOver()">
               	<div class="">
					<div  ng-class="{true: 'tab-pane fade in active', false: 'tab-pane fade'}" id="storage">
				    	<div style="height: 200px;width: 530px;" class="table"  ng-grid="storageOptions"></div>
					</div>
			    </div>
        	</slide-form>
	    </carousel-form>
	</div>
	    <!-- 右侧确认信息 -->
    <div class="detail-table col-md-4">
        <table class="table table-striped">
            <tr>
                <td class="gray"><h4 translate="configDetail"></h4></td>
            </tr>
            <tr>
                <td class="white"><span translate="cluster.cluster"></span></td>
                <td class="white" shortcut cut-str="{{clusterName}}" custom-title>{{clusterName}}</td>
            </tr>
            <tr>
                <td class="gray"><span translate="netstrategy.NetResource"></span></td>
                <td class="gray" shortcut cut-str="{{netResource}}" custom-title>{{netResource}}</td>
            </tr>
            <tr>
                <td class="white"><span translate="org.storageResource"></span></td>
                <td class="white" shortcut cut-str="{{storageResource}}">{{storageResource}}</td>
            </tr>
        </table>
    </div>
</div>
