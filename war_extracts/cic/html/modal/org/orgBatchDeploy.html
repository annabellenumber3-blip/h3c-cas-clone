<!-- 批量部署虚拟机 -->
<div class="modal-header">
    <button type="button" class="close" data-dismiss="modal" ng-click="cancel()" custom-title="{{'common.close'|translate}}">
        <span class="icon-closenew"></span>
    </button>
	<button ng-if="deployType == 0 && flag == 2" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('org/VMTemplate/batchDeployVMForUserInCASOrg')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="deployType == 0 && flag == 3" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('org/VMTemplate/batchDeployVMForUserInVcenterOrg')">
		<span class="icon-helpnew"></span>
	</button>
	<button ng-if="deployType == 1" type="button" class="close cornerhelp" custom-title="{{'help'|translate}}" ng-click="openHelp('cloudService/virtualDesktopPool/vmTemp/batchDeployVMForVirtualDesktopPool')">
		<span class="icon-helpnew"></span>
	</button>
    <h4 class="modal-title"><span translate="org.batchDeploy"></span></h4>
</div>
<!-- 内容 -->
<div class="modal-body row">
	<form name="form" class="form-horizontal" ng-keypress="enter($event)" role="form" novalidate style="margin-bottom:0px;">
		<!-- 集群 -->
	<!-- 	<div class="form-group">
			<label for="cluster" class="control-label"><span translate="cluster.cluster"></span></label>
			<div class="control-input input-group width260" ng-class="{'disable' : deployType==1||gridData.length>0}">
				<select-input class="" options="deployInfo.clusterOptions" bind-model="clusterNum" input-id="cluster" input-name="cluster" input-readonly="{{deployType==1||gridData.length>0}}"></select-input>
			</div>
		</div> -->
		<!-- 资源池 -->
		<div class="form-group" >
			<label for="resourcePool" class="control-label"><span translate="resourcePool.name"></span></label>
			<div class="control-input input-group width260"  ng-class="{'disable' : deployType==1||gridData.length>0}">
				<select-input class="" options="deployInfo.resourcePoolOptions" bind-model="resourcePoolNum" input-id="resourcePool" input-name="resourcePool" input-readonly="{{deployType==1||gridData.length>0}}"></select-input>
			</div>
		</div>	
		
		<!--  保护模式 -->
	    <div class="form-group" ng-if="deployType == 1 && flag != 3">
			<label for="autoDeployVm" class="control-label">
				<span translate="vm.protectModel"></span>
			</label>
			<div class="control-input">
				 <div class="input-group">
			    	<div id="protectModel" toggle-switch  class="switch-success" ng-model="entry.protectModel"></div>
		  	  	</div>
	  	  	</div>
		</div>
		<!--  快速部署 -->
       	<div class="form-group" ng-if="flag != 3">
			<label for="autoDeployVm" class="control-label">
				<span translate="cloudBusiness.fastDeploy"></span>
			</label>
			<div class="control-input">
				 <div class="input-group">
			    	<div id="fastDeploy" toggle-switch  is-disabled="entry.protectModel==true" class="switch-success" ng-model="entry.deployMode"></div>
		  	  	</div>
	  	  	</div>
		</div>	
		
	</form>
	<nav class="navbar-default" role="navigation" style="margin-left:0px;margin-bottom:10px;">
			<div class="container-fluid">
				<div class="btn-group navbar-left" >
					<label class="btn btn-default btn-menu hidden-xs" ng-click="manualDefinition()" >
						<span translate="org.manualDefinition"></span>
					</label>
					<label class="btn btn-default btn-menu hidden-xs" ng-click="inportFromFile()">
						<span translate="org.inportFromFile"></span>
					</label>
				</div>
			</div>
		</nav>
	<div style="width: 100%;height: 300px;" class="table"  ng-grid="gridOptions"></div>
</div>
<div class="modal-footer">
	<button id="okBtn" class="btn btn-green"  ng-if="model.opType != 'view'"  ng-disabled="form.$invalid" ng-click="ok()" translate="common.confirm"></button>
	<button class="btn btn-black" ng-click="cancel()" translate="common.cancel"></button>
</div>
